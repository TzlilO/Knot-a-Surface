    }

    const segPanel = container.querySelector('.kss-seg');
    const segCanvas = container.querySelector('.kss-seg-canvas');
    const segCtx = segCanvas.getContext('2d');
    const segMsgEl = container.querySelector('.kss-seg-msg');
    const segSrcSel = container.querySelector('.kss-seg-src');
    const segSrcL = container.querySelector('.kss-seg-src-l');
    const _segOff = document.createElement('canvas');
    segCanvas.width = segCanvas.height = 232;
    // mask is anchored in WORLD coords (global UV), NOT the moving sample grid — so it
    // stays put as the drone flies, and repeated 'segment' strokes AGGREGATE into it.
    const SEG_BND = 120, SEG_GW = 384;               // world grid: [-120,120] m, ~0.625 m cells
    const seg = { open: false, mode: 'pos', src: 'rgb', pos: [], neg: [], gmask: new Uint8Array(SEG_GW * SEG_GW),
                  has: false, active: false, img: null, W: 0 };
    function segLook(x, z) {
      const i = ((x + SEG_BND) / (2 * SEG_BND) * SEG_GW) | 0, j = ((z + SEG_BND) / (2 * SEG_BND) * SEG_GW) | 0;
      return (i < 0 || j < 0 || i >= SEG_GW || j >= SEG_GW) ? 0 : seg.gmask[j * SEG_GW + i];
    }
    function segMarkWorld(x, z) {                     // mark a 3×3 world neighbourhood (dilate → no gaps)
      const i0 = ((x + SEG_BND) / (2 * SEG_BND) * SEG_GW) | 0, j0 = ((z + SEG_BND) / (2 * SEG_BND) * SEG_GW) | 0;
      for (let dj = -1; dj <= 1; dj++) for (let di = -1; di <= 1; di++) {
        const i = i0 + di, j = j0 + dj;
        if (i >= 0 && j >= 0 && i < SEG_GW && j < SEG_GW) seg.gmask[j * SEG_GW + i] = 1;
      }
    }
    function segMsg(m) { if (segMsgEl) segMsgEl.textContent = m; }

    function segFeature() {                          // snapshot S*S feature image from current recon
      const W = S; seg.W = W;
      const img = new Float32Array(W * W * 3);
      if (seg.src === 'normal') {
        for (let k = 0; k < W * W; k++) { img[k*3] = nrmArr[k*3]*0.5+0.5; img[k*3+1] = nrmArr[k*3+1]*0.5+0.5; img[k*3+2] = nrmArr[k*3+2]*0.5+0.5; }
      } else if (seg.src === 'depth') {
        const cp = cmdrCam.position; let mn = 1e9, mx = -1e9;
        for (let k = 0; k < W * W; k++) { const d = Math.hypot(posArr[k*3]-cp.x, posArr[k*3+1]-cp.y, posArr[k*3+2]-cp.z); if (d<mn) mn=d; if (d>mx) mx=d; }
        const rng = Math.max(1, mx - mn);
        for (let k = 0; k < W * W; k++) { const d = Math.hypot(posArr[k*3]-cp.x, posArr[k*3+1]-cp.y, posArr[k*3+2]-cp.z); const g = 1 - clamp01((d-mn)/rng); img[k*3]=g; img[k*3+1]=g; img[k*3+2]=g; }
      } else {
        const src = splats.instanceColor.array;
        for (let k = 0; k < W * W * 3; k++) img[k] = src[k];
      }
      seg.img = img;
    }

    function segDraw() {
      const W = seg.W; if (!W || !seg.img) return;
      _segOff.width = _segOff.height = W;
      const octx = _segOff.getContext('2d');
      const id = octx.createImageData(W, W), img = seg.img;
      const proj = seg.has && seg.W === S && posArr;   // project the global world mask into this view
      for (let k = 0; k < W * W; k++) {
        let r = img[k*3]*255, g = img[k*3+1]*255, b = img[k*3+2]*255;
        if (proj && segLook(posArr[k*3], posArr[k*3+2])) { r = r*0.35+30; g = g*0.35+200; b = b*0.35+40; }
        id.data[k*4]=r; id.data[k*4+1]=g; id.data[k*4+2]=b; id.data[k*4+3]=255;
      }
      octx.putImageData(id, 0, 0);
      const D = segCanvas.width;
      segCtx.imageSmoothingEnabled = false;
      segCtx.clearRect(0, 0, D, D);
      segCtx.drawImage(_segOff, 0, 0, W, W, 0, 0, D, D);
      const sc = D / W;
      const dot = (p, col) => { segCtx.beginPath(); segCtx.arc((p.i+0.5)*sc, (p.j+0.5)*sc, 4, 0, 7); segCtx.fillStyle = col; segCtx.fill(); segCtx.lineWidth = 1.5; segCtx.strokeStyle = '#000'; segCtx.stroke(); };
      for (const p of seg.pos) dot(p, '#39ff9e');
      for (const p of seg.neg) dot(p, '#ff5b6e');
    }

    function segRun() {                              // seeded mean-split + flood fill (classical CV)
      segFeature();
      const W = seg.W, N = W * W, img = seg.img;
      if (!seg.pos.length) { segMsg('add + (in) seeds on the object first'); return; }
      const mean = list => { const m = [0,0,0]; for (const p of list) { const k = p.j*W+p.i; m[0]+=img[k*3]; m[1]+=img[k*3+1]; m[2]+=img[k*3+2]; } const n = Math.max(1, list.length); return [m[0]/n, m[1]/n, m[2]/n]; };
      const pm = mean(seg.pos);
      let neg;
      if (seg.neg.length) neg = mean(seg.neg);
      else { let g = [0,0,0]; for (let k = 0; k < N; k++) { g[0]+=img[k*3]; g[1]+=img[k*3+1]; g[2]+=img[k*3+2]; } neg = [g[0]/N, g[1]/N, g[2]/N]; }
      const d2 = (a, k) => { const r = img[k*3]-a[0], gg = img[k*3+1]-a[1], b = img[k*3+2]-a[2]; return r*r+gg*gg+b*b; };
      const inC = new Uint8Array(N);
      for (let k = 0; k < N; k++) inC[k] = d2(pm, k) < d2(neg, k) ? 1 : 0;
      const mask = new Uint8Array(N), seen = new Uint8Array(N), stack = [];
      for (const p of seg.pos) { const k = p.j*W+p.i; if (inC[k] && !seen[k]) { seen[k] = 1; stack.push(k); } }
      while (stack.length) {
        const k = stack.pop(); mask[k] = 1;
        const i = k % W, j = (k / W) | 0;
        if (i > 0)   { const nk = k-1; if (inC[nk] && !seen[nk]) { seen[nk]=1; stack.push(nk); } }
        if (i < W-1) { const nk = k+1; if (inC[nk] && !seen[nk]) { seen[nk]=1; stack.push(nk); } }
        if (j > 0)   { const nk = k-W; if (inC[nk] && !seen[nk]) { seen[nk]=1; stack.push(nk); } }
        if (j < W-1) { const nk = k+W; if (inC[nk] && !seen[nk]) { seen[nk]=1; stack.push(nk); } }
      }
      let cnt = 0;
      for (let k = 0; k < N; k++) if (mask[k]) { cnt++; segMarkWorld(posArr[k*3], posArr[k*3+2]); }
      if (cnt) seg.has = true;
      seg.pos = []; seg.neg = [];                 // aggregate: next stroke adds to the mask
      segMsg('+' + cnt.toLocaleString() + ' splats added to mask (world-anchored) - segment more, or "isolate 3D"');
      segDraw();
    }

    function applySeg() {                            // lift the world mask to 3D: hide splats outside it
      if (!seg.active || !seg.has) return;
      const conf = splats.userData.conf;
      for (let k = 0; k < S * S; k++) if (!segLook(posArr[k*3], posArr[k*3+2])) conf.array[k] = 0;
      conf.needsUpdate = true;
    }

    function autoDecompose() {                    // bulk: high-frequency regions get their own splines
      // truncation error IS the frequency disentangler: where the global spline
      // keeps failing, the scene is high-frequency — carve those regions out.
      const hf = new Uint8Array(SEG_GW * SEG_GW);
      const n = S * S, E = ENVS[st.env];
      // estimation error vs GT: |composite spline height − world truth| per sample,
      // plus a steady-climb term (|∇error| along the grid) — transitions like
      // ground→building/tree show up as a consistent local rise before the peak.
      const err = new Float32Array(n);
      for (let k = 0; k < n; k++) err[k] = Math.abs(HH[k] - E.h(posArr[k * 3], posArr[k * 3 + 2], st.t));
      const score = new Float32Array(n);
      let thr = 0;
      for (let j = 0; j < S; j++) for (let i = 0; i < S; i++) {
        const k = j * S + i;
        const gU = Math.abs(err[j * S + Math.min(S - 1, i + 1)] - err[j * S + Math.max(0, i - 1)]) / 2;
        const gV = Math.abs(err[Math.min(S - 1, j + 1) * S + i] - err[Math.max(0, j - 1) * S + i]) / 2;
        score[k] = err[k] + 1.5 * (gU + gV);      // magnitude + climb
        thr += score[k];
      }
      thr = Math.max(0.12, 2.2 * thr / n);        // well above mean estimation error
      for (let k = 0; k < n; k++) if (score[k] > thr) {
        const i = ((posArr[k * 3] + SEG_BND) / (2 * SEG_BND) * SEG_GW) | 0;
        const j = ((posArr[k * 3 + 2] + SEG_BND) / (2 * SEG_BND) * SEG_GW) | 0;
        if (i > 0 && j > 0 && i < SEG_GW - 1 && j < SEG_GW - 1)
          for (let dj = -1; dj <= 1; dj++) for (let di = -1; di <= 1; di++) hf[(j + dj) * SEG_GW + (i + di)] = 1;
      }
      const comp = new Int32Array(SEG_GW * SEG_GW).fill(-1);
      const sizes = [], stack = [];
      for (let s0 = 0; s0 < SEG_GW * SEG_GW; s0++) {
        if (!hf[s0] || comp[s0] >= 0) continue;
        const id = sizes.length; let sz = 0;
        stack.push(s0); comp[s0] = id;
        while (stack.length) {
          const k = stack.pop(); sz++;
          const i = k % SEG_GW, j = (k / SEG_GW) | 0;
          const tryPush = nk => { if (hf[nk] && comp[nk] < 0) { comp[nk] = id; stack.push(nk); } };
          if (i > 0) tryPush(k - 1);
          if (i < SEG_GW - 1) tryPush(k + 1);
          if (j > 0) tryPush(k - SEG_GW);
          if (j < SEG_GW - 1) tryPush(k + SEG_GW);
        }
        sizes.push(sz);
      }
      const order = sizes.map((sz, id) => [sz, id]).sort((a, b) => b[0] - a[0]);
      let made = 0;
      for (const [sz, id] of order) {
        if (made >= 4 || SUBS.length >= 6 || sz < 25) break;   // ponytail: top-4 per pass, rerun for more
        const gm = new Uint8Array(SEG_GW * SEG_GW);
        for (let k = 0; k < comp.length; k++) if (comp[k] === id) gm[k] = 1;
        if (subFromMask(gm)) made++;
      }
      segMsg(made ? 'auto-decomposed ' + made + ' high-frequency regions (' + (SUBS.length + 1) + ' surfaces) - refining'
                  : 'no high-frequency regions above threshold - optimize longer or zoom in');
    }

    /* ── per-surface manager (SPLINES menu) + 3D boundary contours ──
       Contours trace each sub's MASK outline (seg-cell edges between in/out),
       draped on the composite surface, one color per surface; the dimmer square
       is the spline's parametric domain. World-anchored, overlay layer. ── */
    const SUB_COLS = [0xffd54f, 0x4fc3f7, 0xff8a65, 0xba68c8, 0x69f0ae, 0xf06292];
    let boundGrp = null;
    function rebuildBounds() {
      if (boundGrp) {
        scene.remove(boundGrp);
        boundGrp.traverse(o => { if (o.geometry) o.geometry.dispose(); if (o.material && o.material.dispose) o.material.dispose(); });
        boundGrp = null;
      }
      if (!st.show.bounds || !SUBS.length) return;
      boundGrp = new T.Group();
      const cw = 2 * SEG_BND / SEG_GW;
      const drape = (x, z) => { const h = reconH(x, z); return (h === null ? ENVS[st.env].h(x, z, st.t) : h) + 0.5; };
      SUBS.forEach((sb, ni) => {
        const pts = [];
        const seg2 = (xa, za, xb, zb) => { pts.push(xa, drape(xa, za), za, xb, drape(xb, zb), zb); };
        const i0 = Math.max(1, ((sb.x0 + SEG_BND) / cw) | 0), i1 = Math.min(SEG_GW - 2, ((sb.x0 + sb.crop + SEG_BND) / cw) | 0);
        const j0 = Math.max(1, ((sb.z0 + SEG_BND) / cw) | 0), j1 = Math.min(SEG_GW - 2, ((sb.z0 + sb.crop + SEG_BND) / cw) | 0);
        for (let j = j0; j <= j1; j++) for (let i = i0; i <= i1; i++) {
          if (!sb.gm[j * SEG_GW + i]) continue;
          const x = i * cw - SEG_BND, z = j * cw - SEG_BND;
          if (!sb.gm[j * SEG_GW + i - 1]) seg2(x, z, x, z + cw);
          if (!sb.gm[j * SEG_GW + i + 1]) seg2(x + cw, z, x + cw, z + cw);
          if (!sb.gm[(j - 1) * SEG_GW + i]) seg2(x, z, x + cw, z);
          if (!sb.gm[(j + 1) * SEG_GW + i]) seg2(x, z + cw, x + cw, z + cw);
        }
        const g = new T.BufferGeometry();
        g.setAttribute('position', new T.BufferAttribute(new Float32Array(pts), 3));
        const ln = new T.LineSegments(g, new T.LineBasicMaterial({ color: SUB_COLS[ni % 6], transparent: true, opacity: 0.95 }));
        boundGrp.add(ln);
        // parametric domain square, dimmer, draped every ~2 m
        const dp = [], n2 = Math.max(4, Math.ceil(sb.crop / 2));
        const edge = (xa, za, xb, zb) => { for (let s2 = 0; s2 < n2; s2++) { const t0 = s2 / n2, t1 = (s2 + 1) / n2; seg2(xa + (xb - xa) * t0, za + (zb - za) * t0, xa + (xb - xa) * t1, za + (zb - za) * t1); } };
        const P0 = pts.length;
        edge(sb.x0, sb.z0, sb.x0 + sb.crop, sb.z0); edge(sb.x0 + sb.crop, sb.z0, sb.x0 + sb.crop, sb.z0 + sb.crop);
        edge(sb.x0 + sb.crop, sb.z0 + sb.crop, sb.x0, sb.z0 + sb.crop); edge(sb.x0, sb.z0 + sb.crop, sb.x0, sb.z0);
        const g2 = new T.BufferGeometry();
        g2.setAttribute('position', new T.BufferAttribute(new Float32Array(pts.slice(P0)), 3));

      };
    }

    /* ── screen 1: map gallery ── */
    const ENV_INFO = {
      urban:  ['URBAN',  'city blocks · river · forward operating base'],
      forest: ['FOREST', 'canopy · river valley · hidden camp'],
      ocean:  ['OCEAN',  'open sea · destroyer + patrol boats'],
      dust:   ['DUST',   'desert ridges · troop columns']
    };
    function renderMap() {
      body.innerHTML = '<div class="kss-ob-gal">' + Object.keys(ENVS).map(k =>
        '<div class="kss-ob-card' + (sel.env === k ? ' kss-on' : '') + '" data-env="' + k + '">' +
          '<canvas width="264" height="164"></canvas>' +
          '<div class="kss-ob-card-t">' + ENV_INFO[k][0] + '</div>' +
          '<div class="kss-ob-card-d">' + ENV_INFO[k][1] + '</div>' +
        '</div>').join('') + '</div>';
      body.querySelectorAll('.kss-ob-card').forEach((card, n) => {
        const env = card.dataset.env;
        const it = mkPreview(card.querySelector('canvas'), 264, 164);
        it.scene.background = new T.Color(ENVS[env].sky);
        const mesh = new T.Mesh(patchGeo(env, 56, 72), new T.MeshLambertMaterial({ vertexColors: true }));
        it.scene.add(mesh);
        it.tick = orbitTick(it, 62, 42, 0.22, n * 1.7);
        card.addEventListener('click', () => {
          sel.env = env;
          body.querySelectorAll('.kss-ob-card').forEach(c => c.classList.toggle('kss-on', c === card));
        });
      });
    }

    /* ── screen 2: representation — real splat technique vs stitched mesh ── */
    function buildSplatPatch(it, env, crop, N) {
      const E = ENVS[env], cx = ENV_HOME[env].x, cz = ENV_HOME[env].z;
      const g = new T.CircleGeometry(0.5, 14);
      const m = new T.MeshBasicMaterial({
        transparent: true, alphaMap: mkSplatAlphaTex(T),   // the sim's gaussian-falloff sprite
        side: T.DoubleSide, depthWrite: false
      });
      const im = new T.InstancedMesh(g, m, N * N);
      im.instanceColor = new T.InstancedBufferAttribute(new Float32Array(N * N * 3), 3);
      const pts = new Float32Array(N * N * 3), step = crop / (N - 1);
      let k = 0;
      for (let j = 0; j < N; j++) for (let i = 0; i < N; i++, k++) {
        const lx = -crop / 2 + i * step, lz = -crop / 2 + j * step;
        const hh = E.h(cx + lx, cz + lz, 0);
        pts[k * 3] = lx; pts[k * 3 + 1] = hh; pts[k * 3 + 2] = lz;
        const c = E.col(cx + lx, cz + lz, hh, 0);
        im.instanceColor.array[k * 3] = c[0]; im.instanceColor.array[k * 3 + 1] = c[1]; im.instanceColor.array[k * 3 + 2] = c[2];
      }
      im.frustumCulled = false;
      it.scene.add(im);
      const M = new T.Matrix4(), P = new T.Vector3(), S3 = new T.Vector3();
      const rad = step * 1.55;
      it.billboard = () => {                     // splats face the orbiting camera, like the sim
        for (let q = 0; q < N * N; q++) {
          P.set(pts[q * 3], pts[q * 3 + 1], pts[q * 3 + 2]);
          M.compose(P, it.cam.quaternion, S3.set(rad, rad, rad));
          im.setMatrixAt(q, M);
        }
        im.instanceMatrix.needsUpdate = true;
      };
    }
    function buildMeshPatch(it, env, crop, N, kind) {
      if (it.meshGroup) {
        it.scene.remove(it.meshGroup);
        it.meshGroup.traverse(o => { if (o.geometry) o.geometry.dispose(); if (o.material) o.material.dispose(); });
      }
      const grp = new T.Group();
      const g = patchGeo(env, N - 1, crop);
      grp.add(new T.Mesh(g, new T.MeshLambertMaterial({
        vertexColors: true, side: T.DoubleSide,
        polygonOffset: true, polygonOffsetFactor: 1, polygonOffsetUnits: 1
      })));
      // wire per subtype: tri = triangulated, quad = grid rows/cols, tetra = grid + both diagonals
      const pos = g.attributes.position, wire = [];
      const push = (a, b) => wire.push(pos.getX(a), pos.getY(a), pos.getZ(a), pos.getX(b), pos.getY(b), pos.getZ(b));
      const idx = (i, j) => j * N + i;
      for (let j = 0; j < N; j++) for (let i = 0; i < N; i++) {
        if (i + 1 < N) push(idx(i, j), idx(i + 1, j));
        if (j + 1 < N) push(idx(i, j), idx(i, j + 1));
        if (i + 1 < N && j + 1 < N) {
          if (kind === 'tri') push(idx(i + 1, j), idx(i, j + 1));
          if (kind === 'tetra') { push(idx(i + 1, j), idx(i, j + 1)); push(idx(i, j), idx(i + 1, j + 1)); }
        }
      }
      const wg = new T.BufferGeometry();
      wg.setAttribute('position', new T.BufferAttribute(new Float32Array(wire), 3));
      grp.add(new T.LineSegments(wg, new T.LineBasicMaterial({ color: 0x4fc3f7, transparent: true, opacity: 0.35 })));
      it.scene.add(grp);
      it.meshGroup = grp;
    }
    function renderRep() {
      body.innerHTML =
        '<div class="kss-ob-gal">' +
          '<div class="kss-ob-card kss-ob-card-lg' + (sel.recon === 'splats' ? ' kss-on' : '') + '" data-rec="splats">' +
            '<canvas width="330" height="206"></canvas>' +
            '<div class="kss-ob-card-t">3D GAUSSIAN SPLATS</div>' +
            '<div class="kss-ob-card-d">soft gaussian billboards · confidence-driven alpha · facade wall-scan</div>' +
          '</div>' +
          '<div class="kss-ob-card kss-ob-card-lg' + (sel.recon === 'mesh' ? ' kss-on' : '') + '" data-rec="mesh">' +
            '<canvas width="330" height="206"></canvas>' +
            '<div class="kss-ob-card-t">MESH</div>' +
            '<div class="kss-ob-card-d">live 2×2 UV-stitched connectivity · whole budget on the surface</div>' +
            '<div class="kss-ob-row">' + ['tri', 'quad', 'tetra'].map(mk =>
              '<button class="kss-ob-opt' + (sel.meshKind === mk ? ' kss-on' : '') + '" data-mk="' + mk + '">' + mk + '</button>').join('') +
            '</div>' +
          '</div>' +
        '</div>';
      const N = 40, crop = 46;
      const cards = body.querySelectorAll('.kss-ob-card');
      const itS = mkPreview(cards[0].querySelector('canvas'), 330, 206);
      buildSplatPatch(itS, sel.env, crop, N);
      const baseS = orbitTick(itS, 44, 30, 0.25, 0.6);
      itS.tick = t => { baseS(t); itS.billboard(); };
      const itM = mkPreview(cards[1].querySelector('canvas'), 330, 206);
      buildMeshPatch(itM, sel.env, crop, N, sel.meshKind);
      itM.tick = orbitTick(itM, 44, 30, 0.25, 0.6);
      cards.forEach(card => card.addEventListener('click', () => {
        sel.recon = card.dataset.rec;
        if (sel.recon === 'mesh' && sel.sampling === 'fluid') sel.sampling = 'adaptive';  // stitching needs the grid
        cards.forEach(c => c.classList.toggle('kss-on', c === card));
      }));
      body.querySelectorAll('[data-mk]').forEach(b => b.addEventListener('click', e => {
        e.stopPropagation();
        sel.meshKind = b.dataset.mk; sel.recon = 'mesh';
        if (sel.sampling === 'fluid') sel.sampling = 'adaptive';
        cards.forEach(c => c.classList.toggle('kss-on', c.dataset.rec === 'mesh'));
        body.querySelectorAll('[data-mk]').forEach(x => x.classList.toggle('kss-on', x === b));
        buildMeshPatch(itM, sel.env, crop, N, sel.meshKind);
      }));
    }

    /* ── screen 3: resolution & sampling — live control-net diagram ── */
    function renderRes() {
      const DENS = [1, 2, 4, 8, 16];
      const BUDS = [1024, 2048, 4096, 8192, 16384, 32768, 65536, 131072, 262144, 524288];
      const bl = b => b >= 1024 ? (b / 1024) + 'k' : b;
      body.innerHTML =
        '<div class="kss-ob-res">' +
          '<div class="kss-ob-res-ctl">' +
            '<div class="kss-ob-row"><span class="kss-ob-lb">Params</span>' +
              '<input class="kss-ob-den" type="range" min="0" max="4" step="1" value="' + DENS.indexOf(sel.den) + '">' +
              '<span class="kss-ob-val kss-ob-den-v">×' + sel.den + '</span></div>' +
            '<div class="kss-ob-row"><span class="kss-ob-lb">Ctrl-net UV</span>' +
              '<input class="kss-ob-cnet" type="range" min="48" max="192" step="8" value="' + sel.cnet + '">' +
              '<span class="kss-ob-val kss-ob-cnet-v">' + sel.cnet + '×' + sel.cnet + '</span></div>' +
            '<div class="kss-ob-row"><span class="kss-ob-lb">Sampling</span>' + ['adaptive', 'uniform', 'fluid'].map(s =>
              '<button class="kss-ob-opt' + (sel.sampling === s ? ' kss-on' : '') +
              (s === 'fluid' && sel.recon === 'mesh' ? ' kss-ob-dis' : '') + '" data-s="' + s + '">' + s + '</button>').join('') + '</div>' +
            (sel.recon === 'mesh' ? '<div class="kss-ob-note">fluid sampling is unavailable with mesh recon — stitching needs the S×S grid</div>' : '') +
            '<div class="kss-ob-row"><span class="kss-ob-lb">Budget</span>' + BUDS.map(b =>
              '<button class="kss-ob-opt' + (sel.budget === b ? ' kss-on' : '') + '" data-b="' + b + '">' + bl(b) + '</button>').join('') + '</div>' +
            '<div class="kss-ob-note">≥128k is a stress test — heavy on CPU/GPU</div>' +
          '</div>' +
          '<div class="kss-ob-res-viz">' +
            '<canvas class="kss-ob-grid" width="300" height="300"></canvas>' +
            '<div class="kss-ob-viz-cap"></div>' +
          '</div>' +
        '</div>';
      const gc = body.querySelector('.kss-ob-grid'), gx = gc.getContext('2d');
      const cap = body.querySelector('.kss-ob-viz-cap');
      // per-axis importance from the REAL field: mean |∂h| along the other axis
      // (same signal family as rebuildImportance's curvature term)
      const E = ENVS[sel.env], cx0 = ENV_HOME[sel.env].x, cz0 = ENV_HOME[sel.env].z, crop = 72;
      const B = 48, impU = new Float64Array(B), impV = new Float64Array(B);
      for (let i = 0; i < B; i++) for (let j = 0; j < B; j++) {
        const x = cx0 - crop / 2 + (i / (B - 1)) * crop, z = cz0 - crop / 2 + (j / (B - 1)) * crop;
        const d = crop / B;
        impU[i] += Math.abs(E.h(x + d, z, 0) - E.h(x, z, 0));
        impV[j] += Math.abs(E.h(x, z + d, 0) - E.h(x, z, 0));
      }
      const cdf = imp => {
        const c = new Float64Array(B + 1);
        for (let i = 0; i < B; i++) c[i + 1] = c[i] + imp[i] + 0.15 * (imp.reduce((a, b) => a + b, 0) / B);
        for (let i = 0; i <= B; i++) c[i] /= c[B];
        return c;
      };
      const cdfU = cdf(impU), cdfV = cdf(impV);
      const warp = (u, c) => {                   // inverse-CDF: uniform u → importance-warped position
        let lo = 0, hi = B;
        while (lo < hi) { const m = (lo + hi) >> 1; if (c[m + 1] < u) lo = m + 1; else hi = m; }
        const seg = c[lo + 1] - c[lo] || 1;
        return (lo + (u - c[lo]) / seg) / B;
      };
      const eff = () => Math.round(sel.cnet * Math.sqrt(sel.den));   // applyDensity's exact axis law
      let shown = eff();
      function drawGrid(n) {
        const W = gc.width, pad = 8, w = W - 2 * pad;
        gx.clearRect(0, 0, W, W);
        gx.fillStyle = '#04070d'; gx.fillRect(0, 0, W, W);
        gx.strokeStyle = 'rgba(79,195,247,' + Math.max(0.06, Math.min(0.5, 26 / n)) + ')';
        gx.lineWidth = 1; gx.beginPath();
        const nn = Math.round(n);
        for (let i = 0; i <= nn; i++) {
          const p = pad + (i / nn) * w;
          gx.moveTo(p, pad); gx.lineTo(p, pad + w);
          gx.moveTo(pad, p); gx.lineTo(pad + w, p);
        }
        gx.stroke();
        // sample distribution vs the net (dots = where the S×S grid concentrates)
        const D = 20;
        gx.fillStyle = sel.sampling === 'fluid' ? 'rgba(105,240,174,.85)' : 'rgba(255,167,38,.85)';
        for (let i = 0; i < D; i++) for (let j = 0; j < D; j++) {
          let u = (i + 0.5) / D, v = (j + 0.5) / D;
          if (sel.sampling !== 'uniform') { u = warp(u, cdfU); v = warp(v, cdfV); }
          if (sel.sampling === 'fluid') {
            u = clamp01(u + 0.018 * (hash2(i * 13 + 1, j * 7 + 3) - 0.5) * 2);
            v = clamp01(v + 0.018 * (hash2(i * 5 + 2, j * 11 + 4) - 0.5) * 2);
          }
          gx.beginPath();
          gx.arc(pad + u * w, pad + v * w, 1.6, 0, 6.2832);
          gx.fill();
        }
        cap.innerHTML = 'control net <b>' + nn + '×' + nn + '</b> — ' + sel.cnet + ' × √' + sel.den +
          ' · <span style="color:' + (sel.sampling === 'fluid' ? '#69f0ae' : '#ffa726') + '">' + sel.sampling + '</span> samples';
      }
      function animateGrid() {
        cancelAnimationFrame(gridRaf);
        const from = shown, to = eff(), t0 = performance.now();
        const stepFn = () => {
          const u = Math.min(1, (performance.now() - t0) / 280);
          shown = from + (to - from) * (1 - Math.pow(1 - u, 3));    // ~280 ms ease-out
          drawGrid(shown);
          if (u < 1 && !dead) gridRaf = requestAnimationFrame(stepFn);
        };
        gridRaf = requestAnimationFrame(stepFn);
      }
      drawGrid(shown);
      const denS = body.querySelector('.kss-ob-den'), denV = body.querySelector('.kss-ob-den-v');
      denS.addEventListener('input', () => {
        sel.den = DENS[+denS.value]; denV.textContent = '×' + sel.den; animateGrid();
      });
      const cnS = body.querySelector('.kss-ob-cnet'), cnV = body.querySelector('.kss-ob-cnet-v');
      cnS.addEventListener('input', () => {
        sel.cnet = +cnS.value; cnV.textContent = sel.cnet + '×' + sel.cnet; animateGrid();
      });
      body.querySelectorAll('[data-s]').forEach(b => b.addEventListener('click', () => {
        if (b.classList.contains('kss-ob-dis')) return;
        sel.sampling = b.dataset.s;
        body.querySelectorAll('[data-s]').forEach(x => x.classList.toggle('kss-on', x === b));
        drawGrid(shown);
      }));
      body.querySelectorAll('[data-b]').forEach(b => b.addEventListener('click', () => {
        sel.budget = +b.dataset.b;
        body.querySelectorAll('[data-b]').forEach(x => x.classList.toggle('kss-on', x === b));
      }));
    }

    /* ── nav ── */
    const RENDER = [renderMap, renderRep, renderRes];
    function show(n) {
      killPreviews();
      step = n;
      stepEl.textContent = 'STEP ' + (n + 1) + ' / 3 · ' + STEPS[n];
      progFill.style.width = ((n + 1) / 3 * 100) + '%';
      backBtn.style.visibility = n === 0 ? 'hidden' : 'visible';
      nextBtn.textContent = n === 2 ? '▶ START' : 'NEXT →';
      RENDER[n]();
    }
    backBtn.addEventListener('click', () => { if (step > 0) show(step - 1); });
    nextBtn.addEventListener('click', () => {
      if (step < 2) { show(step + 1); return; }
      // START: tear down the galleries, boot the real sim with the chosen setup
      dead = true;
      cancelAnimationFrame(rafId);
      killPreviews();
      container.classList.remove('kss-root');
      inst = create(container, Object.assign({}, opts, { initial: Object.assign({}, sel) }));
    });
    show(0);

    return {
      dispose() {
        if (inst) return inst.dispose();
        dead = true;
        cancelAnimationFrame(rafId);
        killPreviews();
        container.innerHTML = '';
        container.classList.remove('kss-root');
      }
    };
  }

  // _basis: debug/self-check handle — verify gridEval ≡ bicubic per basis mode
  return { create, onboard, _basis: { bicubic, gridEval, deg: d => { BASIS_DEG = d; } } };
})();

</script>
<script>
  KnotSwarmSim.onboard(document.getElementById('sim'), { embed: false });
</script>
</body>
</html>
