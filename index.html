<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Knot-a-Surface — Swarm Resolution-Knob Simulator</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/three@0.158.0/build/three.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;background:#07090f;color:#dde5f0;
  font-family:'Inter',ui-sans-serif,system-ui,sans-serif;overflow:hidden}
#app{display:flex;flex-direction:column;height:100%;padding:14px;gap:10px}
header{flex:none;display:flex;align-items:baseline;gap:14px;flex-wrap:wrap}
header h1{font-size:19px;font-weight:700;letter-spacing:-.02em}
header .sub{font-size:13px;color:#5c6f8a}
header a{font-size:11px;color:#4fc3f7;text-decoration:none;font-weight:700}
header .badge{font-size:10px;font-weight:800;letter-spacing:.14em;text-transform:uppercase;
  color:#4fc3f7;background:#121b2e;border:1.5px solid #1b2a42;border-radius:14px;padding:4px 12px;margin-left:auto}
#sim{flex:1 1 auto;min-height:0}
/* ── KnotSwarmSim shared styles (injected into deck + standalone) ── */
.kss-root{position:relative;width:100%;height:100%;min-height:0;
  font-family:'Inter',ui-sans-serif,system-ui,sans-serif;background:#07090f;
  border:1px solid #1b2a42;border-radius:12px;overflow:hidden}
.kss-stage{position:absolute;inset:0;outline:none}
.kss-canvas{position:absolute;inset:0;width:100%!important;height:100%!important;display:block;cursor:grab;touch-action:none}
.kss-canvas:active{cursor:grabbing}

/* ── inset: small picture-in-picture reference window (bottom-left) ── */
.kss-cmdr{position:absolute;left:10px;bottom:10px;width:28%;max-width:400px;aspect-ratio:16/9;
  border:1.5px solid rgba(79,195,247,.55);border-radius:10px;overflow:hidden;z-index:5;
  box-shadow:0 10px 32px rgba(0,0,0,.55);background:#04070d}
.kss-cmdr-canvas{position:absolute;inset:0;width:100%!important;height:100%!important;display:block;cursor:grab}
.kss-cmdr-canvas:active{cursor:grabbing}
.kss-cmdr-label{position:absolute;top:6px;left:8px;font-size:10px;font-weight:800;letter-spacing:.12em;
  color:#4fc3f7;background:rgba(4,7,13,.72);padding:3px 9px;border-radius:8px;pointer-events:none}
.kss-cmdr-swap{position:absolute;top:5px;right:6px;font-family:inherit;font-size:13px;line-height:1;color:#8fa4c0;
  background:rgba(18,27,46,.92);border:1px solid #22314e;border-radius:8px;padding:3px 8px;cursor:pointer}
.kss-cmdr-swap:hover{color:#4fc3f7;border-color:#4fc3f766}

/* ── commander tool rail: left edge of the main stage ── */
.kss-tools{position:absolute;left:10px;top:196px;z-index:8;display:flex;flex-direction:column;gap:5px}
.kss-cbtn{font-family:inherit;font-size:12px;font-weight:700;line-height:1;color:#8fa4c0;
  background:rgba(18,27,46,.92);border:1px solid #22314e;border-radius:8px;padding:9px 8px;cursor:pointer;
  min-width:36px;min-height:34px;text-align:center;backdrop-filter:blur(4px);transition:all .15s}
.kss-cbtn:hover{color:#dde5f0;border-color:#4fc3f766}
.kss-cbtn.kss-on{color:#4fc3f7;border-color:#4fc3f788;background:rgba(79,195,247,.16)}

/* ── commander readouts on the main stage ── */
.kss-compass{position:absolute;bottom:12px;right:12px;width:30px;height:30px;display:flex;
  flex-direction:column;align-items:center;justify-content:center;font-size:13px;color:#ef5350;
  background:rgba(4,7,13,.7);border:1px solid #22314e;border-radius:50%;pointer-events:none;line-height:.8;z-index:8}
.kss-compass span{font-size:8px;color:#8fa4c0;font-weight:800}
.kss-cpitch-wrap{position:absolute;bottom:52px;right:12px;display:flex;align-items:center;gap:6px;z-index:8;
  background:rgba(4,7,13,.78);border:1px solid #22314e;border-radius:8px;padding:4px 9px}
.kss-topo-wrap{bottom:88px}
.kss-cpitch-wrap span{font-size:9px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:#8fa4c0}
.kss-cpitch-wrap .kss-cpitch-val{color:#4fc3f7;min-width:24px;text-align:right;font-size:10px}
.kss-cpitch{width:86px;accent-color:#4fc3f7;cursor:pointer}
.kss-read-wrap{position:absolute;bottom:12px;left:50%;transform:translateX(-50%);z-index:8;
  display:flex;align-items:center;gap:2px;max-width:52%;
  background:rgba(4,7,13,.82);border:1px solid #22314e;border-radius:8px;padding:2px 6px 2px 2px}
.kss-read-wrap:has(.kss-cmdr-read:empty){display:none}
.kss-read-wrap.kss-min .kss-cmdr-read{display:none}
.kss-cmdr-read{font-size:10.5px;color:#cfdcec;pointer-events:none;text-align:center;padding:2px 4px}
.kss-cmdr-read b{color:#ffe14d}

/* ── info button + popup (top-right corner) ── */
.kss-info-btn{position:absolute;top:10px;right:10px;z-index:20;width:26px;height:26px;border-radius:50%;
  font-family:inherit;font-size:14px;font-weight:800;font-style:italic;color:#8fa4c0;
  background:rgba(18,27,46,.92);border:1px solid #22314e;cursor:pointer;backdrop-filter:blur(4px);transition:all .15s}
.kss-info-btn:hover{color:#4fc3f7;border-color:#4fc3f766}
.kss-info{display:none;position:absolute;top:44px;right:10px;z-index:21;width:min(360px,84%);
  max-height:72%;overflow-y:auto;background:rgba(10,14,24,.97);border:1px solid #22314e;border-radius:12px;
  padding:16px 18px 18px;box-shadow:0 14px 40px rgba(0,0,0,.6);backdrop-filter:blur(10px);color:#aeb9cc}
.kss-info.kss-open{display:block}
.kss-info h4{font-size:14px;color:#dde5f0;margin:0 0 8px;letter-spacing:.01em}
.kss-info h5{font-size:11px;font-weight:800;letter-spacing:.1em;text-transform:uppercase;color:#4fc3f7;margin:13px 0 5px}
.kss-info p{font-size:11.5px;line-height:1.6;margin:0 0 4px}
.kss-info b{color:#cfdcec}
.kss-info-x{position:absolute;top:9px;right:12px;font-family:inherit;font-size:13px;color:#8fa4c0;
  background:none;border:none;cursor:pointer;line-height:1}
.kss-info-x:hover{color:#ef5350}

/* ── phase banner ── */
.kss-phase{display:none;position:absolute;top:10px;left:50%;transform:translateX(-50%);
  font-size:11.5px;font-weight:700;letter-spacing:.06em;color:#ffa726;
  background:rgba(7,9,15,.8);border:1px solid rgba(255,167,38,.4);border-radius:14px;
  padding:5px 16px;pointer-events:none;white-space:nowrap;z-index:6}

/* ── HUD: compact instrument-panel gauges, collapsible ── */
.kss-hud{position:absolute;font-size:10.5px;line-height:1.5;color:#8fa4c0;max-width:min(340px,38%);
  background:rgba(7,9,15,.72);border:1px solid #1b2a42;border-radius:8px;padding:5px 9px 6px;
  pointer-events:none;backdrop-filter:blur(4px)}
.kss-hud b{color:#dde5f0;font-variant-numeric:tabular-nums}
.kss-hud-tl{left:10px;top:10px}
.kss-hud-tr{right:10px;top:46px;text-align:right}   /* clears the info button */
.kss-hud-head{display:flex;align-items:center;justify-content:space-between;gap:8px;
  font-size:8.5px;font-weight:800;letter-spacing:.16em;color:#5c6f8a}
.kss-hud.kss-min .kss-hud-body{display:none}
.kss-hud.kss-min{padding:4px 9px}
.kss-big{font-size:14px;font-weight:700;color:#69f0ae;font-variant-numeric:tabular-nums}
.kss-big span{font-size:10px;font-weight:600;color:#69f0ae99;letter-spacing:.05em}

/* ── fold toggle shared by all floating bubbles (mirrors .kss-info-x) ── */
.kss-fold{font-family:inherit;font-size:11px;line-height:1;color:#8fa4c0;flex:none;
  background:none;border:none;cursor:pointer;padding:2px 4px;pointer-events:auto}
.kss-fold:hover{color:#4fc3f7}
.kss-mode{font-size:12px;font-weight:800;letter-spacing:.12em;color:#4fc3f7}
.kss-force{color:#ffe14d;border-color:rgba(255,225,77,.45)}
.kss-force:hover{background:rgba(255,225,77,.12);border-color:#ffe14d;color:#ffe14d}
.kss-version{position:absolute;bottom:14px;right:50px;font-size:9.5px;color:#4a5b73;
  pointer-events:none;white-space:nowrap;letter-spacing:.02em;opacity:.7;z-index:7}   /* left of the compass */

/* ── dock bar: overlay, foldable, popup menus ── */
.kss-bar{position:absolute;left:0;right:0;bottom:0;z-index:30;
  transition:transform .28s cubic-bezier(.4,0,.2,1)}
.kss-bar.kss-folded{transform:translateY(calc(100% - 17px))}
.kss-bar-handle{height:17px;display:flex;align-items:center;justify-content:center;
  font-size:9px;font-weight:800;letter-spacing:.18em;color:#5c6f8a;cursor:pointer;
  background:rgba(13,18,32,.85);border-top:1px solid #1b2a42;backdrop-filter:blur(6px)}
.kss-bar.kss-folded .kss-bar-handle{color:#4fc3f7}
.kss-dock{display:flex;align-items:center;gap:6px;flex-wrap:nowrap;overflow-x:auto;
  padding:7px 10px;background:rgba(13,18,32,.92);backdrop-filter:blur(6px);scrollbar-width:none}
.kss-dock::-webkit-scrollbar{display:none}
.kss-dbtn{flex:none;font-family:inherit;font-size:10.5px;font-weight:800;letter-spacing:.08em;
  color:#8fa4c0;background:#121b2e;border:1px solid #1b2a42;border-radius:8px;
  padding:9px 13px;min-height:34px;cursor:pointer;transition:all .15s;white-space:nowrap}
.kss-dbtn:hover{border-color:#4fc3f766;color:#dde5f0}
.kss-dbtn.kss-on{color:#4fc3f7;border-color:#4fc3f788;background:rgba(79,195,247,.12)}
.kss-dbtn.kss-zen{color:#ce93d8;border-color:rgba(206,147,216,.4)}
.kss-menus{position:absolute;bottom:100%;left:8px;right:8px;pointer-events:none;margin-bottom:6px}
.kss-menu{display:none}
.kss-menu.kss-open{display:flex;pointer-events:auto;flex-direction:column;gap:7px;align-items:stretch;
  max-height:min(52vh,340px);overflow-y:auto;
  background:rgba(13,18,32,.96);border:1px solid #22314e;border-radius:10px;
  padding:10px 12px;box-shadow:0 -10px 34px rgba(0,0,0,.5);backdrop-filter:blur(8px)}
.kss-mrow{display:flex;flex-wrap:wrap;gap:6px;align-items:center}
.kss-mrow>.kss-lb:first-child{flex:0 0 88px;margin-right:0}
.kss-lb{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:#5c6f8a;margin-right:2px}
.kss-btn{font-family:inherit;font-size:12px;font-weight:600;color:#8fa4c0;background:#121b2e;
  border:1px solid #1b2a42;border-radius:15px;padding:7px 14px;min-height:30px;cursor:pointer;transition:all .15s}
.kss-btn:hover{border-color:#4fc3f766;color:#dde5f0}
.kss-btn.kss-on{color:#4fc3f7;border-color:#4fc3f788;background:rgba(79,195,247,.12)}
.kss-knob{flex:1 1 150px;min-width:130px;display:flex;align-items:center;gap:6px}
.kss-zoom{flex:1;accent-color:#ffa726;cursor:pointer;min-width:90px}
.kss-zval{font-size:11px;font-weight:700;color:#ffa726;min-width:74px;text-align:right;
  font-variant-numeric:tabular-nums;letter-spacing:.04em}

/* ── zen mode: scene + inset only ── */
.kss-zenmode .kss-hud,.kss-zenmode .kss-phase,.kss-zenmode .kss-tools,
.kss-zenmode .kss-compass,.kss-zenmode .kss-cpitch-wrap,.kss-zenmode .kss-read-wrap,
.kss-zenmode .kss-info-btn,.kss-zenmode .kss-info,.kss-zenmode .kss-version{display:none!important}
.kss-zenmode .kss-bar{transform:translateY(110%)}
.kss-zen-exit{display:none;position:absolute;top:10px;left:50%;transform:translateX(-50%);z-index:25;
  font-family:inherit;font-size:10px;font-weight:800;letter-spacing:.14em;color:#ce93d8;
  background:rgba(7,9,15,.55);border:1px solid rgba(206,147,216,.35);border-radius:14px;
  padding:5px 14px;cursor:pointer;opacity:.6}
.kss-zen-exit:hover{opacity:1}
.kss-zenmode .kss-zen-exit{display:block}

/* ── mobile (Chrome/Safari, coarse pointers) ── */
@media (max-width:840px), (pointer:coarse) and (max-width:1100px){
  .kss-hud{font-size:9.5px;padding:5px 8px;line-height:1.45;max-width:44%}
  .kss-hud-tl{max-width:52%}
  .kss-big{font-size:13px}
  .kss-big span{font-size:8.5px}
  .kss-version{font-size:7.5px;bottom:12px;right:44px}
  .kss-phase{font-size:9px;top:6px;padding:4px 10px;max-width:70%;white-space:normal;text-align:center}
  .kss-tools{top:150px;gap:4px}
  .kss-cbtn{font-size:10px;padding:5px 6px;min-width:26px}
  .kss-cmdr{width:40%;max-width:none;left:6px;bottom:6px;border-radius:8px}
  .kss-cmdr-label{font-size:7.5px;top:4px;left:5px;padding:2px 6px}
  .kss-cmdr-swap{font-size:11px;padding:2px 6px}
  .kss-compass{width:22px;height:22px;font-size:9px;bottom:6px;right:8px}
  .kss-compass span{font-size:6px}
  .kss-cpitch-wrap{bottom:34px;right:8px;padding:3px 7px}
  .kss-topo-wrap{bottom:66px}
  .kss-cpitch{width:60px}
  .kss-read-wrap{bottom:6px;max-width:46%;left:auto;right:8px;transform:none}
  .kss-cmdr-read{font-size:9px;padding:2px 4px}
  .kss-info{width:88%;font-size:10px}
  .kss-dbtn{font-size:9.5px;padding:8px 10px;min-height:32px}
  .kss-knob{min-width:96px}
  .kss-zval{min-width:56px;font-size:9.5px}
  .kss-btn{font-size:11px;padding:6px 11px;min-height:28px}
  .kss-lb{font-size:8.5px}
  .kss-mrow>.kss-lb:first-child{flex:0 0 70px}
}

/* ── analysis panels: UV segmentation + terrain gradient ── */
.kss-seg,.kss-grad{position:absolute;top:12px;left:12px;z-index:7;width:236px;
  background:rgba(6,10,18,.95);border:1.5px solid rgba(255,167,38,.5);border-radius:10px;
  padding:7px;box-shadow:0 10px 32px rgba(0,0,0,.6);font-family:inherit;color:#cfe0f0}
.kss-grad{left:auto;right:12px;top:150px;border-color:rgba(105,240,174,.5)}  /* below the top-right HUD */
.kss-seg-head{display:flex;align-items:center;justify-content:space-between;gap:6px;
  font-size:10px;font-weight:800;letter-spacing:.1em;color:#ffa726;margin-bottom:6px}
.kss-grad .kss-seg-head{color:#69f0ae}
.kss-seg.kss-min,.kss-grad.kss-min{width:auto;max-width:236px}
.kss-seg.kss-min .kss-seg-head,.kss-grad.kss-min .kss-seg-head{margin-bottom:0}
.kss-seg.kss-min .kss-seg-canvas,.kss-seg.kss-min .kss-seg-row,.kss-seg.kss-min .kss-seg-msg,
.kss-grad.kss-min .kss-grad-canvas{display:none}
.kss-seg-canvas,.kss-grad-canvas{width:222px;height:222px;display:block;border-radius:6px;
  image-rendering:pixelated;background:#04070d;cursor:crosshair}
.kss-grad-canvas{cursor:default;image-rendering:auto}
.kss-seg-row{display:flex;flex-wrap:wrap;gap:4px;margin-top:6px;align-items:center}
.kss-sbtn{font-family:inherit;font-size:10px;font-weight:700;color:#8fa4c0;background:rgba(18,27,46,.92);
  border:1px solid #22314e;border-radius:6px;padding:6px 8px;min-height:26px;cursor:pointer}
.kss-sbtn.kss-on{color:#04070d;background:#ffa726;border-color:#ffa726}
.kss-seg-src{font-family:inherit;font-size:10px;background:#0e1626;color:#cfe0f0;
  border:1px solid #22314e;border-radius:6px;padding:3px}
.kss-seg-msg{font-size:9.5px;color:#7f93ad;margin-top:5px;line-height:1.35}
.kss-seg{left:64px;top:150px}  /* clear the tool rail and the top-left HUD */

/* ── virtual-drone controls: desktop stick + elevation, mobile twin sticks ── */
.kss-joy,.kss-joy-l,.kss-joy-r{position:absolute;z-index:8;display:none;flex-direction:column;
  align-items:center;gap:5px;user-select:none;touch-action:none}
.kss-drone-on .kss-joy{display:flex}                 /* desktop single stick */
.kss-joy{right:18px;bottom:92px}
.kss-joy-l{left:20px;bottom:26px}
.kss-joy-r{right:20px;bottom:26px}
.kss-joy-base{width:104px;height:104px;border-radius:50%;position:relative;cursor:grab;touch-action:none;
  background:radial-gradient(circle at 50% 42%,rgba(30,42,66,.9),rgba(8,12,20,.92));
  border:1.5px solid rgba(79,195,247,.5);box-shadow:0 8px 26px rgba(0,0,0,.5),inset 0 0 22px rgba(79,195,247,.12)}
.kss-joy-r .kss-joy-base{border-color:rgba(105,240,174,.5);box-shadow:0 8px 26px rgba(0,0,0,.5),inset 0 0 22px rgba(105,240,174,.12)}
.kss-joy-base:active{cursor:grabbing}
.kss-joy-knob{position:absolute;left:50%;top:50%;width:44px;height:44px;margin:-22px 0 0 -22px;border-radius:50%;
  background:radial-gradient(circle at 40% 34%,#4fc3f7,#1c6fa0);border:1px solid #7fd4ff;
  box-shadow:0 3px 10px rgba(0,0,0,.55);transition:transform .04s linear;pointer-events:none}
.kss-joy-r .kss-joy-knob{background:radial-gradient(circle at 40% 34%,#69f0ae,#1c7d52);border-color:#8fffce}
.kss-joy-lbl{font-family:inherit;font-size:9px;font-weight:800;letter-spacing:.14em;color:#4fc3f7;opacity:.85}
.kss-joy-r .kss-joy-lbl{color:#69f0ae}
.kss-joy-elev{position:absolute;right:112px;bottom:6px;display:flex;flex-direction:column;gap:6px}
.kss-joy-up,.kss-joy-dn{font-family:inherit;font-size:13px;line-height:1;color:#4fc3f7;width:36px;height:36px;
  background:rgba(18,27,46,.92);border:1.5px solid rgba(79,195,247,.5);border-radius:9px;cursor:pointer;touch-action:none}
.kss-joy-up:active,.kss-joy-dn:active{background:#1c6fa0;color:#fff}
@media (pointer:coarse){
  .kss-drone-on .kss-joy{display:none}
  .kss-drone-on .kss-joy-l,.kss-drone-on .kss-joy-r{display:flex}
  .kss-drone-on .kss-cmdr{display:none}              /* full-frame on mobile */
  .kss-joy-base{width:120px;height:120px}
  .kss-joy-knob{width:52px;height:52px;margin:-26px 0 0 -26px}
}
/* zen-on-move: show nothing but the frame (sticks stay) */
.kss-moving .kss-hud,.kss-moving .kss-bar,.kss-moving .kss-tools,.kss-moving .kss-cmdr,
.kss-moving .kss-compass,.kss-moving .kss-cpitch-wrap,.kss-moving .kss-read-wrap,
.kss-moving .kss-phase,.kss-moving .kss-info-btn,.kss-moving .kss-version{opacity:0;pointer-events:none;transition:opacity .2s}
.kss-moving .kss-joy-l,.kss-moving .kss-joy-r{opacity:.9}

/* ── onboarding: pre-run mission setup (map → representation → resolution) ── */
.kss-ob{position:absolute;inset:0;z-index:30;display:flex;flex-direction:column;gap:10px;
  padding:20px clamp(14px,4vw,46px) 16px;background:#07090f;color:#8fa4c0;
  font-family:inherit;overflow:auto}
.kss-ob-head{display:flex;align-items:baseline;justify-content:space-between;gap:12px;flex-wrap:wrap}
.kss-ob-title{font-size:17px;font-weight:800;letter-spacing:.18em;color:#dde5f0}
.kss-ob-sub{font-size:10px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:#5c6f8a;margin-top:2px}
.kss-ob-step{font-size:10.5px;font-weight:800;letter-spacing:.14em;color:#4fc3f7;white-space:nowrap}
.kss-ob-prog{flex:none;height:3px;border-radius:2px;background:#121b2e;overflow:hidden}
.kss-ob-prog-fill{height:100%;width:33%;background:#4fc3f7;transition:width .3s ease}
.kss-ob-body{flex:1;display:flex;align-items:center;justify-content:center;min-height:0}
.kss-ob-gal{display:flex;flex-wrap:wrap;gap:14px;justify-content:center;align-items:stretch}
.kss-ob-card{width:288px;background:rgba(13,18,32,.92);border:1px solid #1b2a42;border-radius:12px;
  padding:11px;cursor:pointer;transition:border-color .15s,box-shadow .15s;backdrop-filter:blur(8px)}
.kss-ob-card-lg{width:356px}
.kss-ob-card:hover{border-color:#4fc3f766}
.kss-ob-card.kss-on{border-color:#4fc3f7;box-shadow:0 0 0 1px rgba(79,195,247,.35),0 10px 34px rgba(0,0,0,.5)}

</head>
<body>
<div id="app">
  <header>
    <h1>Swarm Resolution-Knob Simulator</h1>
    <span class="sub">fixed 3DGS budget · B-spline-coupled surface · infinite-resolution zoom</span>
    <a href="arena.html">arena: live match reconstruction &rarr;</a>
    <span class="badge">Knot-a-Surface</span>
  </header>
  <div id="sim"></div>
</div>
<script>
/* ═══════════════════════════════════════════════════════════════════════════
   KnotSwarmSim v3 — drone-swarm "infinite resolution" battlefield simulator
   · Warm-up: model subdivides its parameter domain onto true scene geometry
   · Localized fine-tuning on zoom · fixed splat budget up to 32,768
   · URBAN warzone site: HQ compound, walls, tank, APCs, moving patrol —
     all part of the occupancy field h(x,z,t): the reconstruction tracks them
   · Commander view (reconstruction only): tether/detach toggle, WASD flight,
     ruler + line-of-sight, tactical markers with grid refs, residual heatmap
   API: KnotSwarmSim.create(containerEl, {embed:bool}) → {dispose()}
   Requires: window.THREE (r158 non-module build)
═══════════════════════════════════════════════════════════════════════════ */
window.KnotSwarmSim = (function () {
  'use strict';
  const SIM_VERSION = 'v18';
  const SIM_BUILT = '2026-07-21 09:07 UTC';   // stamped by build.py at build time

  /* ── deterministic value noise ─────────────────────────────────────── */
  function hash2(x, y) {
    let h = (Math.imul(x | 0, 374761393) + Math.imul(y | 0, 668265263)) | 0;
    h = Math.imul(h ^ (h >>> 13), 1274126177);
    return ((h ^ (h >>> 16)) >>> 0) / 4294967295;
  }
  function vnoise(x, y) {
    const xi = Math.floor(x), yi = Math.floor(y);
    const xf = x - xi, yf = y - yi;
    const u = xf * xf * (3 - 2 * xf), v = yf * yf * (3 - 2 * yf);
    const a = hash2(xi, yi), b = hash2(xi + 1, yi),
          c = hash2(xi, yi + 1), d = hash2(xi + 1, yi + 1);
    return a + (b - a) * u + (c - a) * v + (a - b - c + d) * u * v;
  }
  function fbm(x, y, oct) {
    let s = 0, amp = 1, f = 1, norm = 0;
    for (let i = 0; i < oct; i++) { s += amp * vnoise(x * f, y * f); norm += amp; amp *= 0.5; f *= 2.1; }
    return s / norm;
  }
  const clamp01 = x => Math.max(0, Math.min(1, x));
  const clamp = (x, a, b) => Math.max(a, Math.min(b, x));

  /* ── city layout ───────────────────────────────────────────────────── */
  const WORLD = 120;
  const CELL = 9, GAP = 0.28;
  function urbanBlock(x, z) {
    const cx = Math.floor(x / CELL), cz = Math.floor(z / CELL);
    const fx = x / CELL - cx, fz = z / CELL - cz;
    const inB = fx > GAP && fx < 1 - GAP && fz > GAP && fz < 1 - GAP;
    return { inB, cx, cz, fx, fz };
  }
  function riverX(z, amp, base) { return base + amp * Math.sin(z * 0.045) + 4 * Math.sin(z * 0.11); }
  function blockType(cx, cz) {
    const r = hash2(cx, cz);
    if (r <= 0.16) return { t: 'park', r };
    if (r <= 0.30) return { t: 'low', r, h: 3 + 4 * r };
    if (r <= 0.72) return { t: 'mid', r, h: 7 + 8 * r };
    return { t: 'tower', r, h: 14 + 12 * r };
  }

  /* ── WARZONE SITE — forward operating base, part of the occupancy field ──
     Everything here exists in h() and col(), so the swarm reconstructs it.
     The patrol APC moves → h(x,z,t) is time-dependent → live change tracking. */
  const SITE = { x: -18, z: 9, r: 14 };
  function patrolPos(t) {                       // square patrol around the wall
    const s = 30, half = s / 2, per = 4 * s, sp = 4.5;
    let u = (t * sp) % per;
    let x, z, hd;
    if (u < s)            { x = SITE.x - half + u; z = SITE.z - half - 2.2; hd = 0; }
    else if (u < 2 * s)   { x = SITE.x + half + 2.2; z = SITE.z - half + (u - s); hd = Math.PI / 2; }
    else if (u < 3 * s)   { x = SITE.x + half - (u - 2 * s); z = SITE.z + half + 2.2; hd = Math.PI; }
    else                  { x = SITE.x - half - 2.2; z = SITE.z + half - (u - 3 * s); hd = -Math.PI / 2; }
    return { x, z, hd };
  }
  // static vehicles & structures: axis-aligned boxes [x,z,w,d,h, kind]
  const SITE_BOXES = [
    [-22.5, 4.5, 7.0, 5.0, 8.5, 'hq'],        // HQ block
    [-13.5, 13.5, 6.0, 4.0, 3.4, 'barracks'],
    [-24.5, 14.0, 1.6, 1.6, 10.5, 'tower'],   // watchtower
    [-19.5, 8.0, 4.0, 2.4, 1.6, 'tankhull'],  // tank hull
    [-19.5, 8.0, 1.8, 1.4, 2.5, 'tankturret'],
    [-15.0, 6.5, 3.2, 1.9, 1.9, 'apc'],
    [-16.5, 11.0, 3.2, 1.9, 1.9, 'apc'],
    [-11.5, 11.5, 2.6, 1.7, 2.3, 'truck'],
    [-21.0, 12.5, 3.0, 0.7, 1.0, 'sandbag'],
    [-16.0, 4.0, 3.0, 0.7, 1.0, 'sandbag']
  ];
  const CRATERS = [[-9, 5, 2.6], [-25, 1.5, 2.0], [-7, 15, 1.8]];
  // fine site clutter — sub-meter features, resolvable only at fine sampling
  const SITE_FINE = [
    [-15.8, 13.0, 0.8, 0.8, 0.9, 'crate'], [-14.9, 12.6, 0.8, 0.8, 0.9, 'crate'],
    [-15.4, 12.2, 0.7, 0.7, 1.6, 'crate'], [-20.6, 5.6, 0.6, 0.6, 0.9, 'barrel'],
    [-20.1, 5.9, 0.6, 0.6, 0.9, 'barrel'], [-22.5, 4.5, 0.35, 0.35, 14.5, 'antenna']
  ];

  /* ── FINE micro-features: shared rules for the field h()/col() AND 3D props.
     Grid-hash based → deterministic; too small for a coarse control net, they
     emerge in the reconstruction only at high LOD. ── */
  const CARCOLS = [[0.72, 0.70, 0.72], [0.55, 0.12, 0.12], [0.16, 0.25, 0.45], [0.15, 0.15, 0.17], [0.62, 0.55, 0.30]];
  const FINE = {
    car(x, z) {
      const s = 3.4, i = Math.floor(x / s), j = Math.floor(z / s);
      if (hash2(i * 7 + 3, j * 9 + 1) <= 0.74) return null;
      const cx = (i + 0.5) * s, cz = (j + 0.5) * s;
      const rot = hash2(i, j * 3) > 0.5;
      const w = rot ? 0.95 : 1.9, d = rot ? 1.9 : 0.95;
      return { hit: Math.abs(x - cx) < w / 2 && Math.abs(z - cz) < d / 2,
               cx, cz, rot, col: CARCOLS[Math.floor(hash2(i * 3, j * 5) * CARCOLS.length)] };
    },
    ac(x, z) {
      const s = 2.1, i = Math.floor(x / s), j = Math.floor(z / s);
      if (hash2(i * 11 + 5, j * 13 + 2) <= 0.80) return null;
      const cx = (i + 0.5) * s, cz = (j + 0.5) * s;
      return { hit: Math.abs(x - cx) < 0.5 && Math.abs(z - cz) < 0.5, cx, cz };
    },
    log(x, z) {
      const s = 5.0, i = Math.floor(x / s), j = Math.floor(z / s);
      if (hash2(i * 17 + 9, j * 19 + 4) <= 0.85) return null;
      const cx = (i + 0.5) * s, cz = (j + 0.5) * s;
      const rot = hash2(i * 5, j * 7) > 0.5;
      const w = rot ? 0.55 : 2.6, d = rot ? 2.6 : 0.55;
      return { hit: Math.abs(x - cx) < w / 2 && Math.abs(z - cz) < d / 2, cx, cz, rot };
    }
  };
  function siteWall(x, z) {                     // square perimeter wall
    const dx = Math.abs(x - SITE.x), dz = Math.abs(z - SITE.z), half = 15;
    const gate = Math.abs(x - SITE.x) < 2.6 && z < SITE.z;   // south gate opening
    const onX = Math.abs(dx - half) < 0.55 && dz < half + 0.55;
    const onZ = Math.abs(dz - half) < 0.55 && dx < half + 0.55;
    return (onX || onZ) && !gate;
  }
  function inSite(x, z) {
    return Math.abs(x - SITE.x) < 15.6 && Math.abs(z - SITE.z) < 15.6;
  }
  function siteH(x, z, t) {                     // occupancy height inside the FOB
    let h = 0.45 + 0.12 * fbm(x * 0.8, z * 0.8, 3);          // packed dirt pad
    for (const [cx, cz, cr] of CRATERS) {
      const d2 = (x - cx) * (x - cx) + (z - cz) * (z - cz);
      h -= 1.1 * Math.exp(-d2 / (cr * cr));                  // craters
    }
    if (siteWall(x, z)) h = Math.max(h, 2.6);
    for (const [bx, bz, w, d, bh] of SITE_BOXES)
      if (Math.abs(x - bx) < w / 2 && Math.abs(z - bz) < d / 2) h = Math.max(h, bh);
    for (const [bx, bz, w, d, bh] of SITE_FINE)
      if (Math.abs(x - bx) < w / 2 && Math.abs(z - bz) < d / 2) h = Math.max(h, bh);
    // helipad
    const hd2 = (x + 12.5) * (x + 12.5) + (z - 4) * (z - 4);
    if (hd2 < 16) h = Math.max(h, 0.55);
    // moving patrol APC (outside wall but inside site margin handled by caller)
    const P = patrolPos(t || 0);
    if (Math.abs(x - P.x) < 1.7 && Math.abs(z - P.z) < 1.2) h = Math.max(h, 1.9);
    return h;
  }
  function siteCol(x, z, t) {
    const P = patrolPos(t || 0);
    if (Math.abs(x - P.x) < 1.7 && Math.abs(z - P.z) < 1.2) return [0.28, 0.32, 0.22];  // olive APC
    for (const [bx, bz, w, d, bh, kind] of SITE_BOXES)
      if (Math.abs(x - bx) < w / 2 && Math.abs(z - bz) < d / 2) {
        if (kind === 'hq') return [0.52, 0.50, 0.44];
        if (kind === 'barracks') return [0.45, 0.44, 0.36];
        if (kind === 'tower') return [0.40, 0.40, 0.38];
        if (kind === 'tankhull' || kind === 'tankturret') return [0.24, 0.28, 0.18];
        if (kind === 'apc') return [0.28, 0.32, 0.22];
        if (kind === 'truck') return [0.30, 0.28, 0.22];
        if (kind === 'sandbag') return [0.55, 0.48, 0.32];
      }
    for (const [bx, bz, w, d, bh, kind] of SITE_FINE)
      if (Math.abs(x - bx) < w / 2 && Math.abs(z - bz) < d / 2) {
        if (kind === 'crate') return [0.55, 0.42, 0.24];
        if (kind === 'barrel') return [0.30, 0.42, 0.28];
        return [0.70, 0.72, 0.75];               // antenna mast
      }
    if (siteWall(x, z)) return [0.48, 0.46, 0.42];
    const hd2 = (x + 12.5) * (x + 12.5) + (z - 4) * (z - 4);
    if (hd2 < 16) {                                          // helipad: dark pad + white H
      const lx = Math.abs(x + 12.5), lz = Math.abs(z - 4);
      const H = (lx < 1.6 && lz < 0.28) || (Math.abs(lx - 1.2) < 0.28 && lz < 1.6);
      const ring = Math.abs(Math.sqrt(hd2) - 3.5) < 0.3;
      return (H || ring) ? [0.85, 0.85, 0.85] : [0.20, 0.21, 0.22];
    }
    for (const [cx, cz, cr] of CRATERS) {
      const d2 = (x - cx) * (x - cx) + (z - cz) * (z - cz);
      if (d2 < cr * cr * 2.2) return [0.16, 0.13, 0.10];     // scorched
    }
    const g = 0.42 + 0.14 * fbm(x * 1.4, z * 1.4, 3);        // packed dirt
    return [g + 0.10, g + 0.02, g - 0.12];
  }
  function urbanInfo(x, z) {
    if (inSite(x, z)) return { t: 'site' };
    const rx = riverX(z, 9, 26);
    if (Math.abs(x - rx) < 5.5) return { t: 'water' };
    const B = urbanBlock(x, z);
    if (!B.inB) return { t: 'road', fx: B.fx, fz: B.fz };
    return { ...blockType(B.cx, B.cz), fx: B.fx, fz: B.fz };
  }

  const ENVS = {
    urban: {
      sky: 0x0a0f1c, fog: 0x0a0f1c, animated: true,          // patrol moves
      h(x, z, t) {
        const I = urbanInfo(x, z);
        if (I.t === 'site') return siteH(x, z, t);
        if (I.t === 'water') return 0.15;
        if (I.t === 'road') {
          let h = 0.3 + 0.15 * fbm(x * 0.2, z * 0.2, 2);
          const car = FINE.car(x, z);
          if (car && car.hit) h += 1.15;         // parked cars — fine LOD only
          return h;
        }
        if (I.t === 'park') return 0.5 + 1.6 * Math.pow(fbm(x * 0.55 + 9, z * 0.55 + 9, 4), 2);
        let h = I.h + 0.7 * fbm(x * 0.5, z * 0.5, 3);
        if (I.t === 'tower') {
          const core = Math.abs(I.fx - 0.5) < 0.14 && Math.abs(I.fz - 0.5) < 0.14;
          h += core ? 6 : 0;
        }
        const ac = FINE.ac(x, z);
        if (ac && ac.hit) h += 0.9;              // rooftop AC units — fine LOD only
        return h;
      },
      col(x, z, h, t) {
        const I = urbanInfo(x, z);
        if (I.t === 'site') return siteCol(x, z, t);
        if (I.t === 'water') {
          const g = 0.12 * fbm(x * 1.6, z * 1.6 + 3, 3);
          return [0.05 + g, 0.32 + g, 0.55 + g];
        }
        if (I.t === 'road') {
          const car = FINE.car(x, z);
          if (car && car.hit) return car.col;
          const lane = Math.abs(I.fx - 0.5) < 0.018 || Math.abs(I.fz - 0.5) < 0.018;
          const g = 0.13 + 0.05 * fbm(x * 1.3, z * 1.3, 3);
          return lane ? [0.75, 0.62, 0.10] : [g, g + 0.01, g + 0.03];
        }
        if (I.t === 'park') {
          const path = fbm(x * 0.9 + 4, z * 0.9 + 4, 3) > 0.58;
          const gr = 0.5 + 0.4 * fbm(x * 2.0, z * 2.0, 4);
          return path ? [0.62, 0.55, 0.38] : [0.10 + 0.10 * gr, 0.38 + 0.30 * gr, 0.10 + 0.06 * gr];
        }
        const acc = FINE.ac(x, z);
        if (acc && acc.hit) return [0.62, 0.62, 0.66];   // AC unit sheet metal
        const panel = 0.05 * ((Math.floor(x * 1.5) + Math.floor(z * 1.5)) % 2);
        const spek = fbm(x * 2.6, z * 2.6, 3) > 0.64 ? 0.13 : 0;
        if (I.t === 'low')   return [0.62 + panel + spek, 0.30 + panel, 0.20 + panel];
        if (I.t === 'tower') return [0.25 + panel, 0.42 + panel + spek, 0.62 + panel];
        return [0.55 + panel + spek, 0.52 + panel + spek, 0.46 + panel];
      }
    },
    forest: {
      sky: 0x0a1410, fog: 0x0a1410, animated: false,
      terra(x, z) {
        let t = 7 * fbm(x * 0.035, z * 0.035, 3) + 2.2 * fbm(x * 0.09 + 7, z * 0.09 + 7, 3);
        const rx = riverX(z, 12, -8);
        const d = Math.abs(x - rx);
        if (d < 9) t = Math.min(t, 0.9 + (d / 9) * (d / 9) * 3.5);
        return t;
      },
      canopy(x, z) { return canopyAt(x, z); },
      h(x, z) {
        const rx = riverX(z, 12, -8);
        if (Math.abs(x - rx) < 3.4) return 1.0;
        let h = ENVS.forest.terra(x, z) + ENVS.forest.canopy(x, z);
        if (inCamp(x, z)) {
          const base = ENVS.forest.terra(x, z);
          if (inTrench(x, z)) return Math.max(0.2, base - 0.9);   // trench line
          for (const [bx, bz, w, d, bh] of CAMP_BOXES)
            if (Math.abs(x - bx) < w / 2 && Math.abs(z - bz) < d / 2) return base + bh;
          return base;
        }
        if (ENVS.forest.canopy(x, z) < 0.9) {
          const lg = FINE.log(x, z);
          if (lg && lg.hit) h += 0.55;           // fallen logs — fine LOD only
        }
        return h;
      },
      col(x, z, h) {
        const rx = riverX(z, 12, -8);
        if (Math.abs(x - rx) < 3.4) {
          const g = 0.1 * fbm(x * 1.8, z * 1.8, 3);
          return [0.04 + g, 0.30 + g, 0.50 + g];
        }
        const can = ENVS.forest.canopy(x, z);
        if (can > 0.7) {
          const t = canopyTree(x, z);
          const leaf = 0.5 + 0.5 * fbm(x * 2.2, z * 2.2, 4);
          if (t && t.autumn) return [0.70 + 0.2 * leaf, 0.38 + 0.15 * leaf, 0.06];
          if (t && t.conifer) return [0.04 + 0.07 * leaf, 0.26 + 0.26 * leaf, 0.10 + 0.05 * leaf];
          return [0.07 + 0.10 * leaf, 0.34 + 0.34 * leaf, 0.08 + 0.07 * leaf];
        }
        if (inCamp(x, z)) {
          if (inTrench(x, z)) return [0.22, 0.16, 0.10];
          for (const [bx, bz, w, d, bh, kind] of CAMP_BOXES)
            if (Math.abs(x - bx) < w / 2 && Math.abs(z - bz) < d / 2) {
              if (kind === 'tent') return [0.30, 0.36, 0.24];
              if (kind === 'truck') return [0.30, 0.28, 0.22];
              if (kind === 'aa') return [0.26, 0.28, 0.24];
              return [0.55, 0.42, 0.24];
            }
          return [0.40, 0.34, 0.22];              // trampled dirt
        }
        const lg = FINE.log(x, z);
        if (lg && lg.hit) return [0.38, 0.26, 0.15];
        const t = ENVS.forest.terra(x, z);
        const gr = fbm(x * 1.4, z * 1.4, 3);
        if (t < 2.2) return [0.24 + 0.14 * gr, 0.48 + 0.22 * gr, 0.16];
        if (t < 4.5) return [0.34 + 0.12 * gr, 0.40 + 0.14 * gr, 0.16];
        if (t < 6.5) return [0.48 + 0.10 * gr, 0.40 + 0.08 * gr, 0.26];
        return [0.52 + 0.10 * gr, 0.50 + 0.10 * gr, 0.48];
      }

    function buildForestProps() {

    /* ---------- swarm (adaptive size) ---------- */
    let swarm = null, drones = [], DR = 5;

    // World-view visualization of the commander's frustum crop (layer 0 only)

        ap[w++] = b[0]; ap[w++] = b[1]; ap[w++] = b[2];

    /* ---------- reconstruction: surface pool + facade pool (one budget) ---------- */
    let splats = null, wallSplats = null, netLines = null, S = 0, wallCap = 0, wallUsed = 0;
    let meshObj = null, meshWire = null;           // mesh recon: shared verts, per-kind index

    }

    /* ── mesh stitching: slide a 2×2 kernel over the UV-ordered sample grid;

    function meshIndexFor(kind) {

      for (let j = 0; j < C; j++) for (let i = 0; i < C; i++) {

    /* facade albedo: family from the tall side + procedural window grid */
    function facadeCol(x, z, y, tx, tz) {          // (tx,tz) = wall tangent dir
      if (st.env === 'forest') {                   // cliffs / canopy walls
        const g = 0.3 + 0.2 * fbm(x * 1.3 + y, z * 1.3, 3);
        return [g + 0.08, g + 0.04, g - 0.02];
      }

      }

      }
      const I = urbanInfo(x, z);
      let base = [0.42, 0.42, 0.40], glass = false;
      if (I.t === 'site') base = [0.45, 0.43, 0.38];
      else if (I.t === 'low') base = [0.55, 0.28, 0.19];
      else if (I.t === 'tower') { base = [0.20, 0.32, 0.48]; glass = true; }
      else if (I.t === 'mid') base = [0.48, 0.46, 0.40];
      else { const g = 0.3 + 0.1 * fbm(x, z, 3); base = [g, g, g]; }

      const tcoord = x * tx + z * tz;

      const fy = (y / 1.25) % 1, fb = ((tcoord / 1.6) % 1 + 1) % 1;
      const inWin = fy > 0.25 && fy < 0.85 && fb > 0.2 && fb < 0.8 && y > 1.5;

        const lit = hash2(floor_ * 13 + Math.round(x), bay * 7 + Math.round(z)) < (glass ? 0.30 : 0.22);
        if (lit) return [0.95, 0.80, 0.35];        // lit window
        return glass ? [0.10, 0.17, 0.30] : [0.09, 0.11, 0.16];   // dark pane
      }

    let reconDirty = true;
    // camera-follow dirty: set by frustumWindow()/domainStep() while the commander view is
    // moving; gated into a real reconDirty (below, in loop()) on settle/timer/drift instead
    // of every frame.
    let camDirty = false, _lastCamMoveT = -9, _lastSampleT = -9, _reconBuilds = 0;
    let _gwin = { u0: 0, v0: 0, u1: 1, v1: 1 }, _gcrop = CROP_G;
    let uMapA = null, vMapA = null;
    let posArr = null, nrmArr = null, errArr = null,
        wPosArr = null, wNrmArr = null, wErrArr = null, chanArr = null, wChanArr = null;
    const _m = new T.Matrix4(), _q = new T.Quaternion(), _p = new T.Vector3(),
          _s = new T.Vector3(), _n = new T.Vector3(), _up = new T.Vector3(0, 0, 1),
          _t1 = new T.Vector3(), _t2 = new T.Vector3();

    /* ── frustum-constrained sampling: when optimization is idle, the fixed

       visibility-driven UV sampling, exactly the thesis mechanism ── */
    /* forward-facing weight: gaussians spent on slopes facing away from the
       commander are invisible (recon renders only through cmdrCam) — importance
       and fluid potential collapse there, extracting the effective UV sub-space */
    function facing(x, h, z, dhdx, dhdz) {     // 1 → faces commander · 0 → backface
      const vx = cmdrCam.position.x - x, vy = cmdrCam.position.y - h, vz = cmdrCam.position.z - z;
      const d = (-dhdx * vx + vy - dhdz * vz) /
        (Math.hypot(vx, vy, vz) * Math.hypot(dhdx, 1, dhdz));   // cos(normal, view)
      return clamp01(0.5 + d / 0.2);           // soft gate around grazing incidence
    }
    const _frus = new T.Frustum(), _fm = new T.Matrix4();
    const win = { u0: 0, v0: 0, u1: 1, v1: 1, locked: false };
    function frustumWindow() {
      const idle = true;                         // allocation is view-driven, always
      let tu0 = 0, tv0 = 0, tu1 = 1, tv1 = 1, locked = false;
      if (idle && st.show.cmdr) {
        cmdrCam.updateMatrixWorld();
        _fm.multiplyMatrices(cmdrCam.projectionMatrix, cmdrCam.matrixWorldInverse);
        _frus.setFromProjectionMatrix(_fm);
        let found = false, mu0 = 1, mv0 = 1, mu1 = 0, mv1 = 0;
        const G = 15;
        for (let j = 0; j <= G; j++) for (let i = 0; i <= G; i++) {
          const u = i / G, v = j / G;
          _p.set(fit.x0 + u * fit.crop, bicubic(fit.cur, fit.CN, u, v), fit.z0 + v * fit.crop);
          if (_frus.containsPoint(_p)) {
            found = true;
            if (u < mu0) mu0 = u; if (v < mv0) mv0 = v;
            if (u > mu1) mu1 = u; if (v > mv1) mv1 = v;
          }
        }
        if (found) {
          const mrg = 0.05;
          tu0 = clamp01(mu0 - mrg); tv0 = clamp01(mv0 - mrg);
          tu1 = clamp01(mu1 + mrg); tv1 = clamp01(mv1 + mrg);
          if (tu1 - tu0 < 0.10) { const m = (tu0 + tu1) / 2; tu0 = clamp01(m - 0.05); tu1 = clamp01(m + 0.05); }
          if (tv1 - tv0 < 0.10) { const m = (tv0 + tv1) / 2; tv0 = clamp01(m - 0.05); tv1 = clamp01(m + 0.05); }
          locked = (tu1 - tu0) * (tv1 - tv0) < 0.96;
        }
      }
      const a = 0.10;
      const d = Math.abs(tu0 - win.u0) + Math.abs(tv0 - win.v0) + Math.abs(tu1 - win.u1) + Math.abs(tv1 - win.v1);
      win.u0 += (tu0 - win.u0) * a; win.v0 += (tv0 - win.v0) * a;
      win.u1 += (tu1 - win.u1) * a; win.v1 += (tv1 - win.v1) * a;
      // floor the window span: a fast reorientation must never collapse wu/wv to
      // ~0, since cell size and importance-gradient steps divide by it downstream
      const MINW = 0.02;
      if (win.u1 - win.u0 < MINW) { const m = (win.u0 + win.u1) / 2; win.u0 = clamp01(m - MINW / 2); win.u1 = clamp01(m + MINW / 2); }
      if (win.v1 - win.v0 < MINW) { const m = (win.v0 + win.v1) / 2; win.v0 = clamp01(m - MINW / 2); win.v1 = clamp01(m + MINW / 2); }
      win.locked = locked;
      if (d > 0.004) { camDirty = true; _lastCamMoveT = st.t; }
    }
    function heatColor(r01) {
      const x = clamp01(r01);
      return [clamp01(0.15 + 2.2 * x), clamp01(0.9 - 1.6 * Math.abs(x - 0.35)), clamp01(0.9 - 2.2 * x)];
    }
    function updateRecon(time) {
      const E = ENVS[st.env];
      const crop = fit.crop, x0 = fit.x0, z0 = fit.z0, CN = fit.CN;
      const wu = win.u1 - win.u0, wv = win.v1 - win.v0;
      const cellU = crop * wu / S, cellV = crop * wv / S;
      const cell = (cellU + cellV) / 2;
      const lift = 0.35 + 0.012 * crop;
      if (st.fluid) { reconFluidPass(time); roiRing.position.set(st.roi.x, ENVS[st.env].h(st.roi.x, st.roi.z, time) + 0.4, st.roi.z); roiRing.scale.setScalar(fit.crop / 2); return fit.crop; }
      refreshMaps();
      // pass 1: sample heights over the (importance-warped) grid — separable basis cache
      gridEval(fit.cur, CN, uMapA, vMapA, HH);
      if (SUBS.length) for (let j2 = 0; j2 < S; j2++) for (let i2 = 0; i2 < S; i2++) {
        const k2 = j2 * S + i2;
        HH[k2] = subH(x0 + uMapA[i2] * crop, z0 + vMapA[j2] * crop, HH[k2]);
      }
      // pass 2: place splats — each stretches to its nearest neighbors, so steep
      // slopes and wall bases stay void-free (no gaps where geometry exists)
      let k = 0;
      const _hh = (i, j) => HH[Math.max(0, Math.min(S - 1, j)) * S + Math.max(0, Math.min(S - 1, i))];
      const jc = Math.max(1.6, cell * 1.2);        // wall-scale jump threshold (same as facade scan)
      const confA = splats.userData.conf;
      for (let j = 0; j < S; j++) for (let i = 0; i < S; i++) {
        const u = uMapA[i], v = vMapA[j];
        const x = x0 + u * crop, z = z0 + v * crop;
        const h = HH[j * S + i];
        const hL = _hh(i - 1, j), hR = _hh(i + 1, j), hU = _hh(i, j - 1), hD = _hh(i, j + 1);
        // local (non-uniform) cell sizes from the warped maps
        const cu = crop * (uMapA[Math.min(S - 1, i + 1)] - uMapA[Math.max(0, i - 1)]) / 2 || cellU;
        const cvv = crop * (vMapA[Math.min(S - 1, j + 1)] - vMapA[Math.max(0, j - 1)]) / 2 || cellV;
        // truncation error: 2nd-order residual of the tangent-plane approximation
        errArr[k] = Math.abs((hR + hL) / 2 - h) + Math.abs((hD + hU) / 2 - h);
        confA.array[k] = clamp(1.05 - 1.5 * errArr[k], 0.3, 1);   // confidence → opacity
        // discontinuity guard: across a wall-scale jump the facade pool takes over —
        // clamp the slope terms so no single huge tilted gaussian smears the corner
        const dRu = clamp(hR - h, -jc, jc), dLu = clamp(h - hL, -jc, jc);
        const dDv = clamp(hD - h, -jc, jc), dUv = clamp(h - hU, -jc, jc);
        _n.set(-(dRu + dLu) / (2 * cu), 1, -(dDv + dUv) / (2 * cvv)).normalize();
        // NN stretch on the warped grid: large gaussians on planar sparse regions,
        // small fine ones where curvature / texture pulled samples dense
        const su = Math.max(Math.hypot(cu, dRu), Math.hypot(cu, dLu));
        const sv = Math.max(Math.hypot(cvv, dDv), Math.hypot(cvv, dUv));
        _p.set(x, h + lift, z);
        // splat plane strictly spans the surface tangents ∂P/∂u, ∂P/∂v at the mean
        _t1.set(2 * cu, dRu + dLu, 0).normalize().multiplyScalar(Math.min(su * 1.7, cu * 8));
        _t2.set(0, dDv + dUv, 2 * cvv).normalize().multiplyScalar(Math.min(sv * 1.7, cvv * 8));
        _m.makeBasis(_t1, _t2, _n);
        _m.setPosition(_p);
        splats.setMatrixAt(k, _m);
        posArr[k * 3] = _p.x; posArr[k * 3 + 1] = _p.y; posArr[k * 3 + 2] = _p.z;
        nrmArr[k * 3] = _n.x; nrmArr[k * 3 + 1] = _n.y; nrmArr[k * 3 + 2] = _n.z;
        if (st.heat) {
          const r = Math.abs(bicubic(fit.tgt, CN, u, v) - h);
          const hc = heatColor(r / 2.2);
          splats.instanceColor.setXYZ(k, hc[0], hc[1], hc[2]);
        } else {
          const c = E.col(x, z, h, time);
          const shade = 0.52 + 0.48 * Math.max(0, _n.dot(SUN));
          const jit = 0.965 + 0.06 * hash2(i * 7 + 1, j * 5 + 3);
          splats.instanceColor.setXYZ(k,
            clamp01(c[0] * shade * jit), clamp01(c[1] * shade * jit), clamp01(c[2] * shade * jit));
        }
        k++;
      }
      splats.instanceMatrix.needsUpdate = true;
      splats.instanceColor.needsUpdate = true;
      confA.needsUpdate = true;

      /* ── facade pool: bind splats to vertical discontinuities of the fit ──
         Wherever adjacent samples jump in height (building edge, cliff, wall),
         stack wall-oriented splats over the vertical span — windows included. */
      let wk = 0;
      const thr = jc;
      const wConfA = wallSplats.userData.conf;
      const ws = Math.max(0.9, cell * 1.1);        // vertical splat step
      const wallShade = f => 0.55 + 0.45 * f;
      if (st.recon !== 'mesh')                     // mesh: connected grid IS the wall — pool idle
      for (let j = 0; j < S && wk < wallCap; j++) for (let i = 0; i < S && wk < wallCap; i++) {
        for (const [di, dj] of [[1, 0], [0, 1]]) {
          const i2 = i + di, j2 = j + dj;
          if (i2 >= S || j2 >= S) continue;
          const h1 = HH[j * S + i], h2 = HH[j2 * S + i2];
          const dh = h2 - h1;
          if (Math.abs(dh) < thr) continue;
          const lo = Math.min(h1, h2), hi = Math.max(h1, h2);
          const x = x0 + (uMapA[i] + uMapA[i2]) / 2 * crop;
          const z = z0 + (vMapA[j] + vMapA[j2]) / 2 * crop;
          // wall normal: horizontal, pointing toward the LOW side
          const sgn = dh > 0 ? -1 : 1;
          _n.set(di * sgn, 0, dj * sgn);
          // a facade facing away from the commander is never visible — spend nothing
          if (_n.x * (cmdrCam.position.x - x) + _n.z * (cmdrCam.position.z - z) < 0) continue;
          const tx = dj, tz = di;                  // tangent along the wall
          const nSteps = Math.min(Math.ceil((hi - lo) / ws), 24);
          for (let sIdx = 0; sIdx < nSteps && wk < wallCap; sIdx++) {
            const y = lo + (sIdx + 0.5) * (hi - lo) / nSteps;
            _p.set(x + _n.x * 0.12, y, z + _n.z * 0.12);
            // facade basis: wall tangent × vertical — no arbitrary twist
            _t1.set(tx, 0, tz).multiplyScalar(cell * 1.6);
            _t2.set(0, (hi - lo) / nSteps * 1.5, 0);
            _m.makeBasis(_t1, _t2, _n);
            _m.setPosition(_p);
            wallSplats.setMatrixAt(wk, _m);
            wPosArr[wk * 3] = _p.x; wPosArr[wk * 3 + 1] = _p.y; wPosArr[wk * 3 + 2] = _p.z;
            wNrmArr[wk * 3] = _n.x; wNrmArr[wk * 3 + 1] = _n.y; wNrmArr[wk * 3 + 2] = _n.z;
            wErrArr[wk] = (hi - lo) / nSteps * 0.4;
            wConfA.array[wk] = clamp(1.05 - 1.5 * wErrArr[wk], 0.3, 1);
            if (st.heat) {
              const u = clamp01((x - x0) / crop), v = clamp01((z - z0) / crop);
              const r = Math.abs(bicubic(fit.tgt, CN, u, v) - bicubic(fit.cur, CN, u, v));
              const hc = heatColor(r / 2.2);
              wallSplats.instanceColor.setXYZ(wk, hc[0], hc[1], hc[2]);
            } else {
              const fc = facadeCol(x, z, y, tx, tz);
              const sh = wallShade(Math.max(0, _n.dot(SUN) * 0.6 + 0.4));
              wallSplats.instanceColor.setXYZ(wk, clamp01(fc[0] * sh), clamp01(fc[1] * sh), clamp01(fc[2] * sh));
            }
            wk++;
          }
        }
      }
      // forest stem pass: oblique swarm angle reveals trunks under the canopy —
      // reuse the SAME wall/facade splat pool (wk, wallCap), no new arrays.
      if (st.env === 'forest') {
        const obliq = clamp01((st.pitch - 4) / 20);       // nadir ⇒ ~0 (under-canopy hidden); oblique reveals it
        if (obliq > 0.02) {
          const ci0 = Math.floor(x0 / TREE_CELL) - 1, ci1 = Math.ceil((x0 + crop) / TREE_CELL) + 1;
          const cj0 = Math.floor(z0 / TREE_CELL) - 1, cj1 = Math.ceil((z0 + crop) / TREE_CELL) + 1;
          const trunkCol = [0.29, 0.20, 0.14];             // same as buildForestProps' trunkM (0x4a3423)
          for (let cj = cj0; cj <= cj1 && wk < wallCap; cj++) for (let ci = ci0; ci <= ci1 && wk < wallCap; ci++) {
            const t = forestTree(ci, cj);
            if (!t || treeClear(t.x, t.z)) continue;
            if (t.x < x0 || t.x > x0 + crop || t.z < z0 || t.z > z0 + crop) continue;
            // a trunk facing away from the commander spends nothing (same rule as the facade pass)
            const toCamX = cmdrCam.position.x - t.x, toCamZ = cmdrCam.position.z - t.z;
            const base = ENVS.forest.terra(t.x, t.z);
            const topY = base + t.hh * 0.5, botY = base;
            const nSteps = Math.min(10, Math.max(2, Math.ceil((topY - botY) / Math.max(0.3, cell * 0.5))));
            for (let s = 0; s < nSteps && wk < wallCap; s++) {
              const f = (s + 0.5) / nSteps;                // 0 = root flare, 1 = canopy attach
              const y = botY + f * (topY - botY);
              const r = 0.2 + (0.14 - 0.2) * f;             // world-radius taper, matches the trunk mesh exactly
              // camera-facing billboard ring: normal points at the commander, tangent is horizontal
              const nlen = Math.hypot(toCamX, toCamZ) || 1;
              _n.set(toCamX / nlen, 0, toCamZ / nlen);
              _t1.set(-_n.z, 0, _n.x).multiplyScalar(r * 1.7);
              _t2.set(0, (topY - botY) / nSteps * 1.3, 0);
              _p.set(t.x + _n.x * r * 0.3, y, t.z + _n.z * r * 0.3);
              _m.makeBasis(_t1, _t2, _n);
              _m.setPosition(_p);
              wallSplats.setMatrixAt(wk, _m);
              wPosArr[wk * 3] = _p.x; wPosArr[wk * 3 + 1] = _p.y; wPosArr[wk * 3 + 2] = _p.z;
              wNrmArr[wk * 3] = _n.x; wNrmArr[wk * 3 + 1] = _n.y; wNrmArr[wk * 3 + 2] = _n.z;
              wErrArr[wk] = r * 0.4;
              wConfA.array[wk] = clamp(obliq, 0.15, 1);     // faint at low obliquity, solid once well-observed
              const shade = 0.55 + 0.45 * obliq;
              wallSplats.instanceColor.setXYZ(wk, trunkCol[0] * shade, trunkCol[1] * shade, trunkCol[2] * shade);
              wk++;
            }
          }
        }
      }

      wallUsed = wk;
      wallSplats.count = wk;
      wallSplats.instanceMatrix.needsUpdate = true;
      wallSplats.instanceColor.needsUpdate = true;
      wConfA.needsUpdate = true;

      if (st.recon === 'mesh') {                   // decode the SAME samples as a stitched mesh
        const pa = meshObj.geometry.attributes.position, ca = meshObj.geometry.attributes.color;
        pa.array.set(posArr); pa.needsUpdate = true;
        ca.array.set(splats.instanceColor.array); ca.needsUpdate = true;
      }

      if (st.show.net) {
        const ap = netLines.geometry.attributes.position.array;
        let w = 0;
        const liftN = lift + 0.18;
        const P = (i, j) => {
          const u = i / CN, v = j / CN;
          ap[w++] = x0 + u * crop;
          ap[w++] = bicubic(fit.cur, CN, u, v) + liftN;
          ap[w++] = z0 + v * crop;
        };
        for (let j = 0; j <= CN; j++) for (let i = 0; i < CN; i++) { P(i, j); P(i + 1, j); }
        for (let i = 0; i <= CN; i++) for (let j = 0; j < CN; j++) { P(i, j); P(i, j + 1); }
        netLines.geometry.setDrawRange(0, w / 3);
        netLines.geometry.attributes.position.needsUpdate = true;
      }
    }

    /* ---------- adaptive sampling: curvature + texture + non-convergence ----------
       Importance I(u,v) = curvature |∇²S| + high-frequency albedo energy + |target−model|.
       Separable inverse-CDF warping of the S×S grid → dense fine gaussians on detailed
       or non-converging regions, large sparse ones on planar low-texture surface. ---------- */
    const IMP = { G: 40, cdfU: null, cdfV: null, t: -9 };
    function rebuildImportance() {
      const G = IMP.G, wu = win.u1 - win.u0, wv = win.v1 - win.v0;
      const E = ENVS[st.env];
      const hs = new Float32Array((G + 2) * (G + 2));
      const lum = new Float32Array((G + 2) * (G + 2));
      for (let j = 0; j < G + 2; j++) for (let i = 0; i < G + 2; i++) {
        const u = win.u0 + ((i - 0.5) / G) * wu, v = win.v0 + ((j - 0.5) / G) * wv;
        const h = bicubic(fit.cur, fit.CN, clamp01(u), clamp01(v));
        hs[j * (G + 2) + i] = h;
        const cc = E.col(fit.x0 + u * fit.crop, fit.z0 + v * fit.crop, h, st.t) || [0.5, 0.5, 0.5];
        lum[j * (G + 2) + i] = 0.3 * cc[0] + 0.6 * cc[1] + 0.1 * cc[2];
      }
      const mU = new Float32Array(G), mV = new Float32Array(G);
      const II = IMP._I || (IMP._I = new Float32Array(G * G));
      const dwx = wu * fit.crop / G, dwz = wv * fit.crop / G;   // world-space lattice step
      let fwd = 0;
      for (let j = 1; j <= G; j++) for (let i = 1; i <= G; i++) {
        const k = j * (G + 2) + i;
        const lap = Math.abs((hs[k - 1] + hs[k + 1] + hs[k - G - 2] + hs[k + G + 2]) / 4 - hs[k]);
        const tex = Math.abs(lum[k + 1] - lum[k]) + Math.abs(lum[k + G + 2] - lum[k]);
        const u = win.u0 + ((i - 0.5) / G) * wu, v = win.v0 + ((j - 0.5) / G) * wv;
        const res = Math.abs(bicubic(fit.tgt, fit.CN, clamp01(u), clamp01(v)) - hs[k]);
        // backface gate: even inside the frustum, back-slopes are invisible ⇒
        // their importance mass drains, warping samples onto forward-facing ROI
        const fw = facing(fit.x0 + u * fit.crop, hs[k], fit.z0 + v * fit.crop,
          (hs[k + 1] - hs[k - 1]) / (2 * dwx), (hs[k + G + 2] - hs[k - G - 2]) / (2 * dwz));
        if (fw > 0.5) fwd++;
        const I = (0.55 * lap + 2.4 * tex + 0.8 * res + 0.05) * (0.05 + 0.95 * fw);   // floor keeps planar coverage
        II[(j - 1) * G + (i - 1)] = I;
      }
      IMP.fwd = fwd / (G * G);                     // effective forward-facing UV fraction
      // corner/edge padding: an abrupt spike on a planar fabric must not sit next to
      // starved cells (one huge gaussian at a building corner). Dilate the field and
      // keep the peak: density ramps smoothly from low-freq planar to high-detail.
      const IB = IMP._IB || (IMP._IB = new Float32Array(G * G));
      const TT = IMP._TT || (IMP._TT = new Float32Array(G * G));
      IB.set(II);
      for (let pass = 0; pass < 2; pass++) {       // 2× separable 3-tap ≈ σ of ~1.4 cells
        for (let j = 0; j < G; j++) for (let i = 0; i < G; i++)
          TT[j * G + i] = 0.25 * IB[j * G + Math.max(0, i - 1)] + 0.5 * IB[j * G + i] + 0.25 * IB[j * G + Math.min(G - 1, i + 1)];
        for (let j = 0; j < G; j++) for (let i = 0; i < G; i++)
          IB[j * G + i] = 0.25 * TT[Math.max(0, j - 1) * G + i] + 0.5 * TT[j * G + i] + 0.25 * TT[Math.min(G - 1, j + 1) * G + i];
      }
      for (let j = 0; j < G; j++) for (let i = 0; i < G; i++) {
        const Ip = Math.max(II[j * G + i], IB[j * G + i] * 1.35);   // peak kept + padded skirt
        mU[i] += Ip; mV[j] += Ip;
      }
      const mkCdf = m => {
        const cdf = new Float32Array(G + 1);
        for (let i = 0; i < G; i++) cdf[i + 1] = cdf[i] + m[i];
        const tot = cdf[G] || 1;
        for (let i = 0; i <= G; i++) cdf[i] /= tot;
        return cdf;
      };
      IMP.cdfU = mkCdf(mU); IMP.cdfV = mkCdf(mV);
      IMP.t = st.t;
      // report whether the warp actually moved — a static scene must not force
      // a full S² splat rebuild every 0.35 s just because the timer fired
      let moved = !IMP._pu;
      if (moved) { IMP._pu = new Float32Array(G + 1); IMP._pv = new Float32Array(G + 1); }
      else for (let i = 0; i <= G; i++)
        if (Math.abs(IMP.cdfU[i] - IMP._pu[i]) + Math.abs(IMP.cdfV[i] - IMP._pv[i]) > 0.003) { moved = true; break; }
      IMP._pu.set(IMP.cdfU); IMP._pv.set(IMP.cdfV);
      return moved;
    }
    function axisSample(t, cdf) {                  // inverse CDF, linear within cells
      const G = IMP.G;
      let lo = 0, hi = G;
      while (hi - lo > 1) { const m = (lo + hi) >> 1; if (cdf[m] <= t) lo = m; else hi = m; }
      const seg = cdf[hi] - cdf[lo] || 1;
      return (lo + (t - cdf[lo]) / seg) / G;
    }
    function refreshMaps() {
      const wu = win.u1 - win.u0, wv = win.v1 - win.v0;
      for (let i = 0; i < S; i++) {
        const t = (i + 0.5) / S;
        uMapA[i] = win.u0 + (st.adaptive && IMP.cdfU ? axisSample(t, IMP.cdfU) : t) * wu;
        vMapA[i] = win.v0 + (st.adaptive && IMP.cdfV ? axisSample(t, IMP.cdfV) : t) * wv;
      }
    }

    /* ---------- FLUID sampling: gaussians as particles in a potential field ----------
       Potential = the gaussian approximation error (confidence-map truncation metric)
       over the crop. Particles feel  +∇error  (drawn to poorly-approximated regions)
       and  −∇density  (fluid pressure). Equilibrium ⇒ density ∝ error: the placement
       that minimizes total approximation error under a fixed budget. ---------- */
    const FLU = { u: null, v: null, vu: null, vv: null, G: 48, E: null, rho: null, eT: -9,
                  frozen: false, calm: 0, w0: 0, w1: 1, w2: 0, w3: 1 };
    function initFluid() {
      const n = S * S;
      FLU.u = new Float32Array(n); FLU.v = new Float32Array(n);
      FLU.vu = new Float32Array(n); FLU.vv = new Float32Array(n);
      FLU.rho = new Float32Array(FLU.G * FLU.G);
      let k = 0;
      for (let j = 0; j < S; j++) for (let i = 0; i < S; i++) {
        FLU.u[k] = (i + 0.5) / S; FLU.v[k] = (j + 0.5) / S;   // window-relative
        k++;
      }
      FLU.frozen = false; FLU.calm = 0; FLU.flowT = 0;
      FLU.eT = -9;
      // contact hash: neighbor-aware repulsion keeps particles touching, never merging.
      // radius scales with local density (spacing ∝ 1/√ρ): equilibrium spacing in
      // dense high-error regions is smaller than on planar fabric.
      FLU.r0 = 0.55 / S;                           // nominal radius at uniform density
      FLU.r0max = 1.4 / S;                         // sparse-region ceiling
      FLU.HN = Math.max(1, Math.floor(1 / FLU.r0max));   // cell ≥ r0max so 3×3 covers all contacts
      FLU.head = new Int32Array(FLU.HN * FLU.HN);
      FLU.next = new Int32Array(n);
      FLU.pu = new Float32Array(n); FLU.pv = new Float32Array(n);
      FLU.nnu = new Float32Array(n).fill(1 / S);   // measured NN spacing along u / v
      FLU.nnv = new Float32Array(n).fill(1 / S);
    }
    function fluidField() {                        // error potential on a G² lattice
      const G = FLU.G, wu = win.u1 - win.u0, wv = win.v1 - win.v0;
      if (!FLU.E) FLU.E = new Float32Array(G * G);
      const fwA = FLU._fw || (FLU._fw = new Float32Array(G * G));
      let mean = 0;
      for (let j = 0; j < G; j++) for (let i = 0; i < G; i++) {
        const u = win.u0 + (i + 0.5) / G * wu, v = win.v0 + (j + 0.5) / G * wv;
        const e = 1 / G;
        const h = bicubic(fit.cur, fit.CN, u, v);
        const hRu = bicubic(fit.cur, fit.CN, clamp01(u + e * wu), v), hLu = bicubic(fit.cur, fit.CN, clamp01(u - e * wu), v);
        const hDv = bicubic(fit.cur, fit.CN, u, clamp01(v + e * wv)), hUv = bicubic(fit.cur, fit.CN, u, clamp01(v - e * wv));
        const lapU = (hRu + hLu) / 2 - h, lapV = (hDv + hUv) / 2 - h;
        const err = Math.abs(lapU) + Math.abs(lapV) + 0.4 * Math.abs(bicubic(fit.tgt, fit.CN, u, v) - h);
        // backfaces are invisible to the commander — the potential vanishes there,
        // so particles drain toward the forward-facing UV sub-space. Kept OUT of the
        // wake signal below: the ambient camera orbit must not re-wake a settled fluid.
        fwA[j * G + i] = 0.05 + 0.95 * facing(fit.x0 + u * fit.crop, h, fit.z0 + v * fit.crop,
          (hRu - hLu) / (2 * e * wu * fit.crop), (hDv - hUv) / (2 * e * wv * fit.crop));
        FLU.E[j * G + i] = err;
        mean += err;
      }
      mean = mean / (G * G) || 1;
      // temporal blend + change detection: only a real potential shift wakes the fluid
      let delta = 0;
      for (let i = 0; i < G * G; i++) {
        const nv = FLU.E[i] / mean + 0.03;
        const ov = FLU._prevE ? FLU._prevE[i] : nv;
        const bl = ov * 0.6 + nv * 0.4;
        delta = Math.max(delta, Math.abs(bl - ov));
        FLU.E[i] = bl;

    /* ---------- commander render channels: depth / normal / confidence ---------- */

    /* ---------- swarm pose: overlap-controlled per-drone frustums ----------

      footF = alt * 0.85;                          // physical sensor footprint (FOV × altitude)
      const s = footF * (1 - st.ovl);              // spacing from the overlap setting

    /* ---------- auto pilot ---------- */

    function surfacePickFrom(clientX, clientY, cvEl, camera) {  // ray-march the reconstruction

      rc.setFromCamera(new T.Vector2(nx, ny), camera);

      let tPrev = 0, hPrev = null;
      for (let tt = 0; tt < 500; tt += 0.8) {
        const x = o.x + d.x * tt, y = o.y + d.y * tt, z = o.z + d.z * tt;
        const sh = reconH(x, z);
        if (sh !== null && y <= sh) {
          // bisect refine
          let lo = tPrev, hi = tt;
          for (let it = 0; it < 12; it++) {
            const mid = (lo + hi) / 2;
            const mx = o.x + d.x * mid, my = o.y + d.y * mid, mz = o.z + d.z * mid;
            const mh = reconH(mx, mz);
            if (mh !== null && my <= mh) hi = mid; else lo = mid;
          }
          const fx = o.x + d.x * hi, fz = o.z + d.z * hi;
          return new T.Vector3(fx, (reconH(fx, fz) || 0), fz);

      return null;
    }
    const surfacePick = (x, y) => surfacePickFrom(x, y, cmdrCanvas, cmdrCam);
    function losCheck(A, B) {                     // eye-height sight line over recon
      const a = A.clone(); a.y += 1.7;
      const b = B.clone(); b.y += 1.7;
      for (let f = 0.03; f < 0.97; f += 0.02) {
        const x = a.x + (b.x - a.x) * f, y = a.y + (b.y - a.y) * f, z = a.z + (b.z - a.z) * f;
        const sh = reconH(x, z);
        if (sh !== null && y < sh - 0.15) return false;

    }
    function updateRulerViz() {
      for (const key of ['line', 'losLine']) if (rulerState[key]) { overlay.remove(rulerState[key]); rulerState[key].geometry.dispose(); rulerState[key] = null; }
      if (!rulerState.a) return;
      const pts = [rulerState.a.clone(), (rulerState.b || rulerState.a).clone()];
      pts[0].y += 0.5; pts[1].y += 0.5;
      rulerState.line = ovl(new T.Line(new T.BufferGeometry().setFromPoints(pts),
        new T.LineBasicMaterial({ color: 0xffe14d })));

        const dist = rulerState.a.distanceTo(rulerState.b);
        const geo = geoDist(rulerState.a, rulerState.b);
        const los = losCheck(rulerState.a, rulerState.b);
        const e1 = rulerState.a.clone(), e2 = rulerState.b.clone(); e1.y += 2.2; e2.y += 2.2;
        rulerState.losLine = ovl(new T.Line(new T.BufferGeometry().setFromPoints([e1, e2]),

          (los ? '<span style="color:#69f0ae">CLEAR</span>' : '<span style="color:#ef5350">BLOCKED</span>') +
          ' · ' + gridRef(rulerState.b.x, rulerState.b.z);

    function dropMarker(P) {

      m.position.copy(P); m.position.y += 1.1; m.rotation.x = Math.PI;

    /* ---------- TOPO probe: a sphere rolls down the reconstruction's gradient ----------
       Reads local topography the way a commander would: drop, watch it roll, note where
       it settles. Lives on the RECON surface only; cleared from scene+memory on rest. */
    const topo = { R: 2, ball: null, vx: 0, vz: 0, calm: 0 };
    function topoClear() {
      if (!topo.ball) return;
      overlay.remove(topo.ball);
      topo.ball.geometry.dispose(); topo.ball.material.dispose();
      topo.ball = null;
    }
    function topoPlace(P) {
      topoClear();
      topo.ball = new T.Mesh(new T.SphereGeometry(1, 18, 14),
        new T.MeshLambertMaterial({ color: 0xff7043, emissive: 0x431a08 }));
      topo.ball.scale.setScalar(topo.R);
      topo.ball.position.set(P.x, P.y + topo.R, P.z);
      ovl(topo.ball);
      topo.vx = 0; topo.vz = 0; topo.calm = 0;
      cmdrRead.innerHTML = '⚫ probe R ' + topo.R.toFixed(1) + ' m rolling · GRID ' + gridRef(P.x, P.z);
    }
    function topoStep(dt) {
      const B = topo.ball;
      if (!B) return;
      const x = B.position.x, z = B.position.z;
      const hC = reconH(x, z);
      if (hC === null) { topoClear(); cmdrRead.innerHTML = '⚫ probe left the crop · cleared'; return; }
      const e = Math.max(0.5, topo.R * 0.7);
      const hAt = (xx, zz) => { const q = reconH(xx, zz); return q === null ? hC : q; };
      const gx = (hAt(x + e, z) - hAt(x - e, z)) / (2 * e);
      const gz = (hAt(x, z + e) - hAt(x, z - e)) / (2 * e);
      const A = 9.8 / (1 + gx * gx + gz * gz);     // gravity along the incline
      topo.vx = (topo.vx - A * gx * dt) * Math.exp(-1.2 * dt);   // rolling friction (time-based)
      topo.vz = (topo.vz - A * gz * dt) * Math.exp(-1.2 * dt);
      B.position.x += topo.vx * dt;
      B.position.z += topo.vz * dt;
      const h2 = reconH(B.position.x, B.position.z);
      if (h2 !== null) B.position.y += ((h2 + topo.R) - B.position.y) * Math.min(1, dt * 10);
      const sp = Math.hypot(topo.vx, topo.vz);
      if (sp > 0.01) {                             // visual roll about the axis ⟂ velocity
        _t1.set(topo.vz, 0, -topo.vx).normalize();
        B.rotateOnWorldAxis(_t1, -sp * dt / topo.R);
      }
      if (sp < 0.12) topo.calm += dt; else topo.calm = 0;
      if (topo.calm > 1.2) {
        cmdrRead.innerHTML = '⚫ probe settled @ GRID <b>' + gridRef(B.position.x, B.position.z) +
          '</b> · elev ' + (B.position.y - topo.R).toFixed(1) + ' m · cleared';
        topoClear();
      }
    }

    /* geodetic distance: project the flat segment onto the recon surface and
       integrate arc length along the 3D trail */
    function geoDist(A, B) {
      const N2 = 96, dx = (B.x - A.x) / N2, dz = (B.z - A.z) / N2;
      const dpl = Math.hypot(dx, dz);
      let s = 0, ph = reconH(A.x, A.z);
      if (ph === null) ph = A.y;
      for (let i = 1; i <= N2; i++) {
        let h = reconH(A.x + dx * i, A.z + dz * i);
        if (h === null) h = ph;
        s += Math.hypot(dpl, h - ph); ph = h;
      }
      return s;
    }

    /* ---------- TACREF: double-click a gaussian → military-format grid + confidence ----------
       Format: [ENV]01-[2 letters: 10 m squares over the world, MGRS alphabet (no I/O)]
               [easting 4dig] [northing 4dig] within-square (mm precision),
       plus the UV-domain coordinate the gaussian mean maps to, and its truncation error. */
    const MGRS_AB = 'ABCDEFGHJKLMNPQRSTUVWXYZ';
    const ENV_CODE = { urban: 'URB', forest: 'FOR', ocean: 'OCN', dust: 'DST' };
    function tacRef(x, z) {
      const ex = clamp(x + WORLD, 0, 2 * WORLD - 0.001), nz = clamp(z + WORLD, 0, 2 * WORLD - 0.001);
      const L = MGRS_AB[Math.min(23, Math.floor(ex / 10))] + MGRS_AB[Math.min(23, Math.floor(nz / 10))];
      const e4 = ('0000' + Math.round((ex % 10) * 1000)).slice(-4);
      const n4 = ('0000' + Math.round((nz % 10) * 1000)).slice(-4);
      return ENV_CODE[st.env] + '01-' + L + ' ' + e4 + ' ' + n4;
    }
    const tacRing = new T.Mesh(new T.RingGeometry(0.72, 0.9, 24),
      new T.MeshBasicMaterial({ color: 0xffe14d, transparent: true, opacity: 0.95, side: T.DoubleSide, depthWrite: false }));
    tacRing.visible = false;

    function tacQuery(clientX, clientY, cvEl, camera) {

      for (let w = 0; w < wallUsed; w++) {
        const d2 = (wPosArr[w * 3] - P.x) ** 2 + (wPosArr[w * 3 + 1] - P.y) ** 2 + (wPosArr[w * 3 + 2] - P.z) ** 2;
        if (d2 < best) { best = d2; kind = 'facade'; gk = w; gx = wPosArr[w * 3]; gy = wPosArr[w * 3 + 1]; gz = wPosArr[w * 3 + 2]; err = wErrArr[w]; }
      }

        'CONFIDENCE err ' + err.toFixed(3) + ' m (' + grade + ')\n' +
        'ENV ' + st.env + ' · LOD x' + (CROP_G / fit.crop).toFixed(1) + ' · basis ' + st.deg.toUpperCase();

    /* ---------- mesh export: UV 2×2 kernel sweep → triangle mesh → PLY ---------- */
    const exp_ = { active: false, cell: 0, total: 0, alpha: 2, saved: null, done: -9 };
    function buildPLY() {
      const M = Math.min(512, Math.round(S * exp_.alpha));       // upsampled α× grid
      const wu = win.u1 - win.u0, wv = win.v1 - win.v0;
      const E = ENVS[st.env];
      const nV = M * M, nF = 2 * (M - 1) * (M - 1);
      const head = 'ply\nformat binary_little_endian 1.0\ncomment Knot-a-Surface swarm reconstruction\n' +
        'element vertex ' + nV + '\nproperty float x\nproperty float y\nproperty float z\n' +
        'property uchar red\nproperty uchar green\nproperty uchar blue\n' +
        'element face ' + nF + '\nproperty list uchar int vertex_indices\nend_header\n';
      const hb = new TextEncoder().encode(head);
      const buf = new ArrayBuffer(hb.length + nV * 15 + nF * 13);
      new Uint8Array(buf).set(hb, 0);
      const dv = new DataView(buf);
      let o = hb.length;
      const mapAx = t => st.adaptive && IMP.cdfU ? axisSample(t, IMP.cdfU) : t;
      const mapAy = t => st.adaptive && IMP.cdfV ? axisSample(t, IMP.cdfV) : t;
      for (let j = 0; j < M; j++) for (let i = 0; i < M; i++) {
        const u = win.u0 + mapAx((i + 0.5) / M) * wu, v = win.v0 + mapAy((j + 0.5) / M) * wv;
        const x = fit.x0 + u * fit.crop, z = fit.z0 + v * fit.crop;
        const h = subH(x, z, bicubic(fit.cur, fit.CN, u, v));

      }

        const a = j * M + i, b = a + 1, cIdx = a + M, d = cIdx + 1;   // the 2×2 window
        dv.setUint8(o, 3); dv.setInt32(o + 1, a, true); dv.setInt32(o + 5, b, true); dv.setInt32(o + 9, d, true); o += 13;

    function startExport() {

    }
    function exportStep(dt) {
      if (!exp_.active) return;
      // the 2×2 kernel sweeps the UV domain scanline-wise — world-space propagation,
      // 4 gaussians enhanced per tick (as in the slides' tessellation animation)
      const speed = Math.max(2, Math.ceil(exp_.total * dt / 2.5)); // 2.5 s wall-clock sweep
      const colA = splats.instanceColor.array;
      for (let n = 0; n < speed && exp_.cell < exp_.total; n++, exp_.cell++) {
        const ci = exp_.cell % (S - 1), cj = (exp_.cell / (S - 1)) | 0;
        for (const [di, dj] of [[0, 0], [1, 0], [0, 1], [1, 1]]) {
          const k = (cj + dj) * S + (ci + di);
          colA[k * 3] = 0.35; colA[k * 3 + 1] = 1.0; colA[k * 3 + 2] = 1.0;   // enhance 4 gaussians
        }
        if (exp_.cell > S * 2) {                                  // trail fades to a done-tint
          const back = exp_.cell - S * 2;
          const bi = back % (S - 1), bj = (back / (S - 1)) | 0;
          const k = bj * S + bi;
          colA[k * 3] = exp_.saved[k * 3] * 0.7 + 0.09;
          colA[k * 3 + 1] = exp_.saved[k * 3 + 1] * 0.7 + 0.24;
          colA[k * 3 + 2] = exp_.saved[k * 3 + 2] * 0.7 + 0.24;
        }
      }
      splats.instanceColor.needsUpdate = true;
      if (st.recon === 'mesh') { const c2 = meshObj.geometry.attributes.color; c2.array.set(colA); c2.needsUpdate = true; }
      if (exp_.cell >= exp_.total) {
        splats.instanceColor.array.set(exp_.saved);
        splats.instanceColor.needsUpdate = true;
        exp_.active = false; exp_.done = st.t;

        '<div>' + (st.drone ? '🛩 observer drone @ GRID <b>' : '✈ commander @ GRID <b>') + gridRef(cOrbit.tx, cOrbit.tz) + '</b>' + (st.heat ? ' · ▦ residual view' : '') + '</div>';
      if (st.warm.active) {

    /* ---------- interaction: main view ---------- */
    const ray = new T.Raycaster(); const ndc = new T.Vector2();
    const _panF = new T.Vector3();
    /* right-drag / shift-drag → pan the orbit target across the ground plane */
    function panTarget(o, cammm, cap, ax, az, dx, dy) {
      cammm.getWorldDirection(_panF); _panF.y = 0; _panF.normalize();
      const rx = _panF.z, rz = -_panF.x;             // screen-right on the ground

    const droneBtn = container.querySelector('.kss-drone-t');
    function makeStick(sel, state) {                  // wire a joystick base to a {x,y} axis pair

      const set = (cx, cy) => {
        const r = base.getBoundingClientRect(), R = r.width / 2;
        let dx = cx - (r.left + R), dy = cy - (r.top + R);
        const m = Math.hypot(dx, dy); if (m > R) { dx = dx / m * R; dy = dy / m * R; }
        knob.style.transform = 'translate(' + dx.toFixed(1) + 'px,' + dy.toFixed(1) + 'px)';
        state.x = dx / R; state.y = -dy / R;          // stick up = +y
      };
      const end = () => { state.x = 0; state.y = 0; id = null; knob.style.transform = 'translate(0,0)'; };
      base.addEventListener('pointerdown', e => {
        e.stopPropagation(); e.preventDefault();
        id = e.pointerId; try { base.setPointerCapture(e.pointerId); } catch (_) {}
        drone.auto = false; drone.idleT = st.t; set(e.clientX, e.clientY);

    const cnetSlider = bar.querySelector('.kss-cnet'), cnetVal = bar.querySelector('.kss-cnet-val');
    if (cnetSlider) {

      cnetSlider.addEventListener('input', () => { cnetVal.textContent = cnetSlider.value + 'x' + cnetSlider.value; });
