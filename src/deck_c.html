<script>
'use strict';
/* ═══════════════════ shared math: clamped B-splines ═══════════════════ */
function clampedKnots(n, p) {           // n CPs, degree p
  const K = [];
  for (let i = 0; i <= p; i++) K.push(0);
  const inner = n - p - 1;
  for (let i = 1; i <= inner; i++) K.push(i / (inner + 1));
  for (let i = 0; i <= p; i++) K.push(1);
  return K;
}
function basisFuncs(K, p, n, u) {       // all N_{i,p}(u), returns Float32Array(n)
  const N = new Float32Array(n);
  if (u >= 1) u = 1 - 1e-9;
  // find span
  let s = p;
  while (s < n - 1 && u >= K[s + 1]) s++;
  const left = [], right = [], tmp = [1];
  for (let j = 1; j <= p; j++) {
    left[j] = u - K[s + 1 - j]; right[j] = K[s + j] - u;
    let saved = 0;
    for (let r = 0; r < j; r++) {
      const t = tmp[r] / (right[r + 1] + left[j - r]);
      tmp[r] = saved + right[r + 1] * t;
      saved = left[j - r] * t;
    }
    tmp[j] = saved;
  }
  for (let j = 0; j <= p; j++) N[s - p + j] = tmp[j];
  return N;
}
// surface eval: cps flat [ (x,y,z) * nu*nv ] row-major (iv*nu+iu)
function evalSurf(cps, nu, nv, KU, KV, u, v, out) {
  const Nu = basisFuncs(KU, 3, nu, u), Nv = basisFuncs(KV, 3, nv, v);
  let x = 0, y = 0, z = 0;
  for (let j = 0; j < nv; j++) {
    const bv = Nv[j]; if (!bv) continue;
    for (let i = 0; i < nu; i++) {
      const bu = Nu[i]; if (!bu) continue;
      const k = (j * nu + i) * 3, w = bu * bv;
      x += w * cps[k]; y += w * cps[k + 1]; z += w * cps[k + 2];
    }
  }
  out.set(x, y, z);
  return out;
}
// Boehm midpoint insertion in U for a CP grid → new grid (exact)
function insertMidKnotsU(cps, nu, nv, KU, p) {
  let curK = KU.slice(), cur = cps, curNu = nu;
  const spans = [];
  for (let i = p; i < curK.length - p - 1; i++)
    if (curK[i + 1] > curK[i]) spans.push((curK[i] + curK[i + 1]) / 2);
  for (const ub of spans) {
    let k = p; while (k < curK.length - p - 2 && ub >= curK[k + 1]) k++;
    const nn = curNu + 1, out = new Float32Array(nn * nv * 3);
    for (let j = 0; j < nv; j++) {
      for (let i = 0; i < nn; i++) {
        let a;
        if (i <= k - p) a = 1;
        else if (i >= k + 1) a = 0;
        else a = (ub - curK[i]) / (curK[i + p] - curK[i]);
        const o = (j * nn + i) * 3;
        const iA = (j * curNu + Math.min(i, curNu - 1)) * 3;
        const iB = (j * curNu + Math.max(i - 1, 0)) * 3;
        out[o] = a * cur[iA] + (1 - a) * cur[iB];
        out[o + 1] = a * cur[iA + 1] + (1 - a) * cur[iB + 1];
        out[o + 2] = a * cur[iA + 2] + (1 - a) * cur[iB + 2];
      }
    }
    curK = curK.slice(0, k + 1).concat([ub], curK.slice(k + 1));
    cur = out; curNu = nn;
  }
  return { cps: cur, nu: curNu, K: curK };
}
function transposeGrid(cps, nu, nv) {
  const out = new Float32Array(nu * nv * 3);
  for (let j = 0; j < nv; j++) for (let i = 0; i < nu; i++) {
    const a = (j * nu + i) * 3, b = (i * nv + j) * 3;
    out[b] = cps[a]; out[b + 1] = cps[a + 1]; out[b + 2] = cps[a + 2];
  }
  return out;
}

/* ═══════════════════ tiny helpers ═══════════════════ */
const T3 = window.THREE;
function fitCanvas(cv) {
  const r = cv.getBoundingClientRect();
  if (r.width < 4) return false;
  const d = Math.min(devicePixelRatio, 2);
  if (cv.width !== (r.width * d | 0)) { cv.width = r.width * d; cv.height = r.height * d; }
  return true;
}
function makeRenderer(cv) {
  const rd = new T3.WebGLRenderer({ canvas: cv, antialias: true, alpha: true });
  rd.setPixelRatio(Math.min(devicePixelRatio, 2));
  return rd;
}
function sizeRenderer(rd, cv, cam) {
  const r = cv.getBoundingClientRect();
  if (r.width < 4 || r.height < 4) return;
  rd.setSize(r.width, r.height, false);
  if (cam) { cam.aspect = r.width / r.height; cam.updateProjectionMatrix(); }
}
function hash1(i, j) {
  let h = (Math.imul(i | 0, 374761393) + Math.imul(j | 0, 668265263)) | 0;
  h = Math.imul(h ^ (h >>> 13), 1274126177);
  return ((h ^ (h >>> 16)) >>> 0) / 4294967295;
}
function simpleOrbit(cv, orbit, apply) {
  let drag = false, px = 0, py = 0;
  const dn = e => { drag = true; px = e.clientX; py = e.clientY; };
  const mv = e => {
    if (!drag) return;
    orbit.th += (e.clientX - px) * 0.006;
    orbit.ph = Math.max(0.1, Math.min(1.4, orbit.ph + (e.clientY - py) * 0.005));
    px = e.clientX; py = e.clientY; apply();
  };
  const up = () => drag = false;
  const wh = e => { e.preventDefault(); orbit.r = Math.max(4, Math.min(80, orbit.r * (1 + Math.sign(e.deltaY) * 0.08))); apply(); };
  cv.addEventListener('pointerdown', dn); window.addEventListener('pointermove', mv);
  window.addEventListener('pointerup', up); cv.addEventListener('wheel', wh, { passive: false });
  return () => { cv.removeEventListener('pointerdown', dn); window.removeEventListener('pointermove', mv);
    window.removeEventListener('pointerup', up); cv.removeEventListener('wheel', wh); };
}

/* ═══════════════════ WIDGET: title background ═══════════════════ */
function wTitle(section) {
  const cv = section.querySelector('#title-bg');
  const ctx = cv.getContext('2d');
  let raf = 0, dead = false, t = 0;
  function loop() {
    if (dead) return;
    raf = requestAnimationFrame(loop);
    if (!fitCanvas(cv)) return;
    t += 0.008;
    const W = cv.width, H = cv.height;
    ctx.clearRect(0, 0, W, H);
    const N = 26, M = 15;
    for (let j = 0; j < M; j++) for (let i = 0; i < N; i++) {
      const u = i / (N - 1), v = j / (M - 1);
      const h = Math.sin(u * 5 + t * 2) * Math.cos(v * 4 - t * 1.3) * 0.5 +
                Math.sin(u * 11 + v * 7 + t) * 0.18;
      const x = (u - 0.5) * W * 1.12 + W / 2 + (v - 0.5) * W * 0.06;
      const y = (v - 0.5) * H * 0.85 + H / 2 - h * H * 0.10;
      const s = (0.5 + 0.5 * v) * W * 0.010;
      const a = 0.05 + 0.16 * (0.5 + 0.5 * Math.sin(u * 6 + v * 5 + t * 2));
      ctx.beginPath();
      ctx.ellipse(x, y, s * 1.7, s * (0.45 + 0.3 * Math.abs(h)), h * 0.7, 0, 6.29);
      ctx.fillStyle = 'rgba(79,195,247,' + a.toFixed(3) + ')';
      ctx.fill();
    }
    ctx.fillStyle = 'rgba(7,9,15,0.35)';
    ctx.fillRect(0, 0, W, H);
  }
  loop();
  return { dispose() { dead = true; cancelAnimationFrame(raf); } };
}

/* ═══════════════════ WIDGET: B-spline playground v2 ═══════════════════
   Full NURBS: adjustable degree, per-CP weight/color/splat-scale (dbl-click
   a control point), draggable CPs, exact midpoint knot insertion.        */
// extended CP record: 8 channels [x,y,z, w, r,g,b, sMul]
const BS_STRIDE = 8;
function evalNURBS(cps, nu, nv, KU, KV, p, q, u, v, out) {
  const Nu = basisFuncs(KU, p, nu, u), Nv = basisFuncs(KV, q, nv, v);
  let X = 0, Y = 0, Z = 0, W = 0, R = 0, G = 0, B = 0, SM = 0;
  for (let j = 0; j < nv; j++) {
    const bv = Nv[j]; if (!bv) continue;
    for (let i = 0; i < nu; i++) {
      const bu = Nu[i]; if (!bu) continue;
      const k = (j * nu + i) * BS_STRIDE;
      const w = cps[k + 3], bw = bu * bv * w;
      X += bw * cps[k]; Y += bw * cps[k + 1]; Z += bw * cps[k + 2]; W += bw;
      R += bw * cps[k + 4]; G += bw * cps[k + 5]; B += bw * cps[k + 6]; SM += bw * cps[k + 7];
    }
  }
  const iw = W !== 0 ? 1 / W : 0;
  out.x = X * iw; out.y = Y * iw; out.z = Z * iw;
  out.r = R * iw; out.g = G * iw; out.b = B * iw; out.s = SM * iw;
  return out;
}
// exact midpoint knot insertion in U on the extended grid (rational: weights ride along)
function bsInsertU(cps, nu, nv, KU, p) {
  let curK = KU.slice(), cur = cps, curNu = nu;
  const spans = [];
  for (let i = p; i < curK.length - p - 1; i++)
    if (curK[i + 1] > curK[i]) spans.push((curK[i] + curK[i + 1]) / 2);
  for (const ub of spans) {
    let k = p; while (k < curK.length - p - 2 && ub >= curK[k + 1]) k++;
    const nn = curNu + 1, out = new Float32Array(nn * nv * BS_STRIDE);
    for (let j = 0; j < nv; j++) for (let i = 0; i < nn; i++) {
      let a;
      if (i <= k - p) a = 1; else if (i >= k + 1) a = 0;
      else a = (ub - curK[i]) / (curK[i + p] - curK[i]);
      const o = (j * nn + i) * BS_STRIDE;
      const iA = (j * curNu + Math.min(i, curNu - 1)) * BS_STRIDE;
      const iB = (j * curNu + Math.max(i - 1, 0)) * BS_STRIDE;
      for (let c = 0; c < BS_STRIDE; c++) out[o + c] = a * cur[iA + c] + (1 - a) * cur[iB + c];
    }
    curK = curK.slice(0, k + 1).concat([ub], curK.slice(k + 1));
    cur = out; curNu = nn;
  }
  return { cps: cur, nu: curNu, K: curK };
}
function bsTranspose(cps, nu, nv) {
  const out = new Float32Array(nu * nv * BS_STRIDE);
  for (let j = 0; j < nv; j++) for (let i = 0; i < nu; i++) {
    const a = (j * nu + i) * BS_STRIDE, b = (i * nv + j) * BS_STRIDE;
    for (let c = 0; c < BS_STRIDE; c++) out[b + c] = cps[a + c];
  }
  return out;
}

function wBspline(section) {
  const cv = section.querySelector('#bspline-canvas');
  const rd = makeRenderer(cv);
  const scene = new T3.Scene();
  const cam = new T3.PerspectiveCamera(46, 16 / 9, 0.1, 200);
  scene.add(new T3.AmbientLight(0xffffff, 0.7),
    (() => { const L = new T3.DirectionalLight(0xbfd8ff, 0.9); L.position.set(6, 10, 4); return L; })());
  const orbit = { th: -0.9, ph: 0.5, r: 15 };
  const applyCam = () => {
    cam.position.set(orbit.r * Math.cos(orbit.ph) * Math.cos(orbit.th), orbit.r * Math.sin(orbit.ph), orbit.r * Math.cos(orbit.ph) * Math.sin(orbit.th));
    cam.lookAt(0, 0.4, 0);
  };
  applyCam();
  let stopOrbit = null;

  const SHAPES = {
    wave: (x, z) => 1.1 * Math.sin(x * 0.9) * Math.cos(z * 0.9),
    dome: (x, z) => 2.4 - 0.16 * (x * x + z * z),
    saddle: (x, z) => 0.11 * (x * x - z * z),
    terrain: (x, z) => 1.5 * (hash1(Math.round(x * 2) + 9, Math.round(z * 2) + 7) - 0.3) + 0.7 * Math.sin(x) * Math.cos(z * 1.3)
  };
  let deg = 3, nu = 6, nv = 6, KU = clampedKnots(6, 3), KV = clampedKnots(6, 3);
  let cps = null, SN = 10;
  const SURF_RES = 28;
  function heightColor(y) {          // default control-feature color: height gradient
    const f = Math.max(0, Math.min(1, (y + 1.6) / 3.6));
    return [0.16 + 0.35 * f, 0.42 + 0.42 * f, 0.85 - 0.25 * f];
  }
  function fillShape(name) {
    cps = new Float32Array(nu * nv * BS_STRIDE);
    for (let j = 0; j < nv; j++) for (let i = 0; i < nu; i++) {
      const x = (i / (nu - 1) - 0.5) * 8, z = (j / (nv - 1) - 0.5) * 8;
      const y = SHAPES[name](x, z);
      const k = (j * nu + i) * BS_STRIDE;
      const c = heightColor(y);
      cps[k] = x; cps[k + 1] = y; cps[k + 2] = z;
      cps[k + 3] = 1;                                  // NURBS weight
      cps[k + 4] = c[0]; cps[k + 5] = c[1]; cps[k + 6] = c[2];
      cps[k + 7] = 1;                                  // splat-scale multiplier
    }
  }
  let shapeName = 'wave';
  fillShape(shapeName);

  let cpMesh = null, netLines = null, surfMesh = null, splats = null, selRing = null;
  const _o = {}, _o2 = {}, _o3 = {};
  const _v = new T3.Vector3(), _v2 = new T3.Vector3(), _v3 = new T3.Vector3(),
        _q = new T3.Quaternion(), _m = new T3.Matrix4(), _up = new T3.Vector3(0, 0, 1);

  function rebuildObjects() {
    for (const o of [cpMesh, netLines, surfMesh, splats, selRing]) if (o) { scene.remove(o); if (o.geometry) o.geometry.dispose(); }
    cpMesh = new T3.InstancedMesh(new T3.SphereGeometry(0.22, 12, 9),
      new T3.MeshBasicMaterial({ color: 0xffa726, transparent: true, opacity: 0.95 }), nu * nv);
    scene.add(cpMesh);
    const segs = (nu - 1) * nv + (nv - 1) * nu;
    netLines = new T3.LineSegments(
      new T3.BufferGeometry().setAttribute('position', new T3.BufferAttribute(new Float32Array(segs * 6), 3)),
      new T3.LineBasicMaterial({ color: 0xffa726, transparent: true, opacity: 0.3 }));
    scene.add(netLines);
    const g = new T3.PlaneGeometry(1, 1, SURF_RES, SURF_RES);
    surfMesh = new T3.Mesh(g, new T3.MeshLambertMaterial({
      color: 0x4a7bd0, transparent: true, opacity: 0.28, side: T3.DoubleSide, depthWrite: false }));
    scene.add(surfMesh);
    splats = new T3.InstancedMesh(new T3.CircleGeometry(0.5, 12),
      new T3.MeshBasicMaterial({ transparent: true, opacity: 0.72, side: T3.DoubleSide, depthWrite: false }), 40 * 40);
    splats.instanceColor = new T3.InstancedBufferAttribute(new Float32Array(40 * 40 * 3), 3);
    scene.add(splats);
    selRing = new T3.Mesh(new T3.RingGeometry(0.3, 0.36, 20),
      new T3.MeshBasicMaterial({ color: 0x4fc3f7, side: T3.DoubleSide }));
    selRing.visible = false;
    scene.add(selRing);
  }

  function refresh() {
    for (let j = 0; j < nv; j++) for (let i = 0; i < nu; i++) {
      const k = j * nu + i, b = k * BS_STRIDE;
      const wScale = 0.75 + 0.35 * Math.min(2.5, cps[b + 3]);   // weight shown as CP size
      _m.compose(_v.set(cps[b], cps[b + 1], cps[b + 2]), _q.identity(), _v2.set(wScale, wScale, wScale));
      cpMesh.setMatrixAt(k, _m);
    }
    cpMesh.instanceMatrix.needsUpdate = true;
    const ap = netLines.geometry.attributes.position.array;
    let w = 0;
    const put = k => { const b = k * BS_STRIDE; ap[w++] = cps[b]; ap[w++] = cps[b + 1]; ap[w++] = cps[b + 2]; };
    for (let j = 0; j < nv; j++) for (let i = 0; i < nu - 1; i++) { put(j * nu + i); put(j * nu + i + 1); }
    for (let i = 0; i < nu; i++) for (let j = 0; j < nv - 1; j++) { put(j * nu + i); put((j + 1) * nu + i); }
    netLines.geometry.attributes.position.needsUpdate = true;
    const pos = surfMesh.geometry.attributes.position;
    let idx = 0;
    for (let j = 0; j <= SURF_RES; j++) for (let i = 0; i <= SURF_RES; i++) {
      evalNURBS(cps, nu, nv, KU, KV, deg, deg, i / SURF_RES, j / SURF_RES, _o);
      pos.setXYZ(idx++, _o.x, _o.y, _o.z);
    }
    pos.needsUpdate = true;
    surfMesh.geometry.computeVertexNormals();
    const e = 0.012;
    let k2 = 0;
    for (let j = 0; j < SN; j++) for (let i = 0; i < SN; i++) {
      const u = (i + 0.5) / SN, v = (j + 0.5) / SN;
      evalNURBS(cps, nu, nv, KU, KV, deg, deg, u, v, _o);
      evalNURBS(cps, nu, nv, KU, KV, deg, deg, Math.min(1, u + e), v, _o2);
      evalNURBS(cps, nu, nv, KU, KV, deg, deg, u, Math.min(1, v + e), _o3);
      _v2.set(_o2.x - _o.x, _o2.y - _o.y, _o2.z - _o.z);
      _v3.set(_o3.x - _o.x, _o3.y - _o.y, _o3.z - _o.z);
      const n = _v2.clone().cross(_v3).normalize();
      _q.setFromUnitVectors(_up, n);
      const sm = Math.max(0.15, _o.s);
      const su = _v2.length() / e / SN * 1.2 * sm, sv = _v3.length() / e / SN * 1.2 * sm;
      _m.compose(_v.set(_o.x, _o.y, _o.z).addScaledVector(n, 0.03), _q, new T3.Vector3(su, sv, 1));
      splats.setMatrixAt(k2, _m);
      splats.instanceColor.setXYZ(k2, _o.r, _o.g, _o.b);
      k2++;
    }
    splats.count = SN * SN;
    splats.instanceMatrix.needsUpdate = true;
    splats.instanceColor.needsUpdate = true;
    section.querySelector('#bs-grid-label').textContent = nu + '×' + nv + ' CPs · degree ' + deg;
  }
  rebuildObjects(); refresh();

  /* CP dragging + selection */
  const ray = new T3.Raycaster(); const ndc = new T3.Vector2();
  let dragCP = -1, selCP = -1; const plane = new T3.Plane(); const hitP = new T3.Vector3();
  function toNDC(e) {
    const r = cv.getBoundingClientRect();
    ndc.set(((e.clientX - r.left) / r.width) * 2 - 1, -((e.clientY - r.top) / r.height) * 2 + 1);
  }
  function pickCP(e) {
    toNDC(e); ray.setFromCamera(ndc, cam);
    const hit = ray.intersectObject(cpMesh)[0];
    return hit && hit.instanceId !== undefined ? hit.instanceId : -1;
  }
  function cpDown(e) {
    const id = pickCP(e);
    if (id >= 0) {
      dragCP = id;
      const b = id * BS_STRIDE;
      plane.setFromNormalAndCoplanarPoint(cam.getWorldDirection(_v).negate(), _v2.set(cps[b], cps[b + 1], cps[b + 2]));
      e.stopImmediatePropagation();
    }
  }
  function cpMove(e) {
    if (dragCP < 0) return;
    toNDC(e); ray.setFromCamera(ndc, cam);
    if (ray.ray.intersectPlane(plane, hitP)) {
      const b = dragCP * BS_STRIDE;
      cps[b] = hitP.x; cps[b + 1] = hitP.y; cps[b + 2] = hitP.z;
      if (selCP === dragCP) placeSelRing();
      refresh();
    }
  }
  const cpUp = () => dragCP = -1;
  function placeSelRing() {
    if (selCP < 0) { selRing.visible = false; return; }
    const b = selCP * BS_STRIDE;
    selRing.position.set(cps[b], cps[b + 1], cps[b + 2]);
    selRing.lookAt(cam.position);
    selRing.visible = true;
  }
  /* per-CP editor panel (dbl-click) */
  const panel = section.querySelector('#bs-cp-panel');
  const pw = panel.querySelector('#bs-cp-w'), pc = panel.querySelector('#bs-cp-color'),
        ps = panel.querySelector('#bs-cp-s'), pTitle = panel.querySelector('#bs-cp-title');
  function openPanel(id) {
    selCP = id;
    const b = id * BS_STRIDE;
    pTitle.textContent = 'CP (' + (id % nu) + ',' + Math.floor(id / nu) + ')';
    pw.value = cps[b + 3]; ps.value = cps[b + 7];
    const hx = c => ('0' + Math.round(Math.max(0, Math.min(1, c)) * 255).toString(16)).slice(-2);
    pc.value = '#' + hx(cps[b + 4]) + hx(cps[b + 5]) + hx(cps[b + 6]);
    panel.style.display = 'block';
    placeSelRing();
  }
  function closePanel() { selCP = -1; selRing.visible = false; panel.style.display = 'none'; }
  function cpDbl(e) {
    const id = pickCP(e);
    if (id >= 0) { openPanel(id); e.stopImmediatePropagation(); } else closePanel();
  }
  const onW = () => { if (selCP >= 0) { cps[selCP * BS_STRIDE + 3] = +pw.value; refresh(); } };
  const onS = () => { if (selCP >= 0) { cps[selCP * BS_STRIDE + 7] = +ps.value; refresh(); } };
  const onC = () => {
    if (selCP < 0) return;
    const b = selCP * BS_STRIDE, h = pc.value;
    cps[b + 4] = parseInt(h.slice(1, 3), 16) / 255;
    cps[b + 5] = parseInt(h.slice(3, 5), 16) / 255;
    cps[b + 6] = parseInt(h.slice(5, 7), 16) / 255;
    refresh();
  };
  const onClose = () => closePanel();
  pw.addEventListener('input', onW); ps.addEventListener('input', onS); pc.addEventListener('input', onC);
  panel.querySelector('#bs-cp-close').addEventListener('click', onClose);

  cv.addEventListener('pointerdown', cpDown);
  cv.addEventListener('dblclick', cpDbl);
  window.addEventListener('pointermove', cpMove);
  window.addEventListener('pointerup', cpUp);
  stopOrbit = simpleOrbit(cv, orbit, applyCam);

  /* UI */
  const onClick = [];
  function wire(sel, fn) {
    section.querySelectorAll(sel).forEach(b => { const h = () => fn(b); b.addEventListener('click', h); onClick.push([b, h]); });
  }
  function resetGrid() {
    nu = 6; nv = 6;
    KU = clampedKnots(nu, deg); KV = clampedKnots(nv, deg);
    fillShape(shapeName); closePanel(); rebuildObjects(); refresh();
  }
  wire('.bs-shape', b => {
    section.querySelectorAll('.bs-shape').forEach(x => x.classList.toggle('on', x === b));
    shapeName = b.dataset.s; resetGrid();
  });
  wire('.bs-deg', b => {
    section.querySelectorAll('.bs-deg').forEach(x => x.classList.toggle('on', x === b));
    deg = +b.dataset.d; resetGrid();
  });
  wire('.bs-n', b => {
    section.querySelectorAll('.bs-n').forEach(x => x.classList.toggle('on', x === b));
    SN = +b.dataset.n; refresh();
  });
  wire('#bs-subdiv', () => {
    if (nu > 24) return;
    let r = bsInsertU(cps, nu, nv, KU, deg);
    cps = r.cps; nu = r.nu; KU = r.K;
    let tr = bsTranspose(cps, nu, nv);
    r = bsInsertU(tr, nv, nu, KV, deg);
    cps = bsTranspose(r.cps, r.nu, nu); nv = r.nu; KV = r.K;
    closePanel(); rebuildObjects(); refresh();
  });
  wire('#bs-shuffle', () => {
    for (let k = 0; k < nu * nv; k++) {
      const b = k * BS_STRIDE;
      cps[b + 1] += (Math.random() - 0.5) * 1.6;
    }
    refresh();
  });

  let raf = 0, dead = false;
  (function loop() {
    if (dead) return;
    raf = requestAnimationFrame(loop);
    if (selRing.visible) selRing.lookAt(cam.position);
    sizeRenderer(rd, cv, cam);
    rd.render(scene, cam);
  })();
  return { dispose() {
    dead = true; cancelAnimationFrame(raf); if (stopOrbit) stopOrbit();
    cv.removeEventListener('pointerdown', cpDown);
    cv.removeEventListener('dblclick', cpDbl);
    window.removeEventListener('pointermove', cpMove);
    window.removeEventListener('pointerup', cpUp);
    pw.removeEventListener('input', onW); ps.removeEventListener('input', onS); pc.removeEventListener('input', onC);
    for (const [b, h] of onClick) b.removeEventListener('click', h);
    rd.dispose();
  } };
}

/* ═══════════════════ WIDGET: tangent frame ═══════════════════ */
function wFrame(section) {
  const cv = section.querySelector('#frame-canvas');
  const rd = makeRenderer(cv);
  const scene = new T3.Scene();
  const cam = new T3.PerspectiveCamera(45, 16 / 9, 0.1, 100);
  scene.add(new T3.AmbientLight(0xffffff, 0.7), (()=>{const L=new T3.DirectionalLight(0xbfd8ff, 0.9);L.position.set(5, 8, 3);return L})());
  const orbit = { th: -0.8, ph: 0.55, r: 11 };
  const applyCam = () => {
    cam.position.set(orbit.r * Math.cos(orbit.ph) * Math.cos(orbit.th), orbit.r * Math.sin(orbit.ph), orbit.r * Math.cos(orbit.ph) * Math.sin(orbit.th));
    cam.lookAt(0, 0.3, 0);
  };
  const stopOrbit = simpleOrbit(cv, orbit, applyCam);
  applyCam();

  const nu = 6, nv = 6, KU = clampedKnots(nu, 3), KV = clampedKnots(nv, 3);
  const cps = new Float32Array(nu * nv * 3);
  for (let j = 0; j < nv; j++) for (let i = 0; i < nu; i++) {
    const x = (i / (nu - 1) - 0.5) * 7, z = (j / (nv - 1) - 0.5) * 7;
    const k = (j * nu + i) * 3;
    cps[k] = x; cps[k + 1] = 1.0 * Math.sin(x * 0.85) * Math.cos(z * 0.8); cps[k + 2] = z;
  }
  const RES = 30;
  const g = new T3.PlaneGeometry(1, 1, RES, RES);
  const _v = new T3.Vector3();
  {
    const pos = g.attributes.position; let idx = 0;
    for (let j = 0; j <= RES; j++) for (let i = 0; i <= RES; i++) {
      evalSurf(cps, nu, nv, KU, KV, i / RES, j / RES, _v);
      pos.setXYZ(idx++, _v.x, _v.y, _v.z);
    }
    g.computeVertexNormals();
  }
  scene.add(new T3.Mesh(g, new T3.MeshLambertMaterial({ color: 0x24466b, transparent: true, opacity: 0.5, side: T3.DoubleSide })));
  scene.add(new T3.LineSegments(new T3.WireframeGeometry(g), new T3.LineBasicMaterial({ color: 0x4fc3f7, transparent: true, opacity: 0.10 })));

  const aTu = new T3.ArrowHelper(new T3.Vector3(1, 0, 0), new T3.Vector3(), 1.7, 0xffa726, 0.35, 0.2);
  const aTv = new T3.ArrowHelper(new T3.Vector3(0, 0, 1), new T3.Vector3(), 1.7, 0xce93d8, 0.35, 0.2);
  const aN = new T3.ArrowHelper(new T3.Vector3(0, 1, 0), new T3.Vector3(), 1.7, 0x69f0ae, 0.35, 0.2);
  const disc = new T3.Mesh(new T3.CircleGeometry(1, 24),
    new T3.MeshBasicMaterial({ color: 0x4fc3f7, transparent: true, opacity: 0.4, side: T3.DoubleSide, depthWrite: false }));
  const discRing = new T3.Mesh(new T3.RingGeometry(0.97, 1.03, 24),
    new T3.MeshBasicMaterial({ color: 0x4fc3f7, side: T3.DoubleSide }));
  scene.add(aTu, aTv, aN, disc, discRing);

  const _p = new T3.Vector3(), _du = new T3.Vector3(), _dv = new T3.Vector3(), _n = new T3.Vector3(), _q = new T3.Quaternion(), _up = new T3.Vector3(0, 0, 1);
  let raf = 0, dead = false, t = 0;
  (function loop() {
    if (dead) return;
    raf = requestAnimationFrame(loop);
    t += 0.004;
    const u = 0.5 + 0.38 * Math.sin(t * 2.1), v = 0.5 + 0.38 * Math.sin(t * 1.3 + 1.2);
    const e = 0.012;
    evalSurf(cps, nu, nv, KU, KV, u, v, _p);
    evalSurf(cps, nu, nv, KU, KV, u + e, v, _du).sub(_p).normalize();
    evalSurf(cps, nu, nv, KU, KV, u, v + e, _dv).sub(_p).normalize();
    _n.copy(_du).cross(_dv).normalize();
    if (_n.y < 0) _n.negate();
    const tv = _n.clone().cross(_du).normalize();
    aTu.position.copy(_p); aTu.setDirection(_du);
    aTv.position.copy(_p); aTv.setDirection(tv);
    aN.position.copy(_p); aN.setDirection(_n);
    _q.setFromUnitVectors(_up, _n);
    disc.position.copy(_p).addScaledVector(_n, 0.02); disc.quaternion.copy(_q); disc.scale.setScalar(0.9);
    discRing.position.copy(disc.position); discRing.quaternion.copy(_q); discRing.scale.setScalar(0.9);
    sizeRenderer(rd, cv, cam);
    rd.render(scene, cam);
  })();
  return { dispose() { dead = true; cancelAnimationFrame(raf); stopOrbit(); rd.dispose(); } };
}

/* ═══════════════════ WIDGET: initialization (MBA) ═══════════════════ */
function wInit(section) {
  const cv = section.querySelector('#init-canvas');
  const rd = makeRenderer(cv);
  const scene = new T3.Scene();
  const cam = new T3.PerspectiveCamera(46, 16 / 9, 0.1, 200);
  scene.add(new T3.AmbientLight(0xffffff, 0.65), (()=>{const L=new T3.DirectionalLight(0xbfd8ff, 0.9);L.position.set(6, 10, 4);return L})());
  const orbit = { th: -0.85, ph: 0.5, r: 16 };
  const applyCam = () => {
    cam.position.set(orbit.r * Math.cos(orbit.ph) * Math.cos(orbit.th), orbit.r * Math.sin(orbit.ph), orbit.r * Math.cos(orbit.ph) * Math.sin(orbit.th));
    cam.lookAt(0, 0.5, 0);
  };
  const stopOrbit = simpleOrbit(cv, orbit, applyCam);
  applyCam();

  const GT = (x, z) => 1.3 * Math.sin(x * 0.75) * Math.cos(z * 0.7) + 0.5 * Math.sin(x * 1.9 + 1) * Math.sin(z * 1.6) + 0.22 * Math.sin(x * 4.2) * Math.cos(z * 3.7);
  // point cloud
  const NP = 1600;
  const pgeo = new T3.BufferGeometry();
  const parr = new Float32Array(NP * 3);
  const pts = [];
  for (let i = 0; i < NP; i++) {
    const x = (hash1(i, 3) - 0.5) * 9, z = (hash1(i, 11) - 0.5) * 9;
    const y = GT(x, z) + (hash1(i, 17) - 0.5) * 0.34;
    parr[i * 3] = x; parr[i * 3 + 1] = y; parr[i * 3 + 2] = z;
    pts.push([x, y, z]);
  }
  pgeo.setAttribute('position', new T3.BufferAttribute(parr, 3));
  scene.add(new T3.Points(pgeo, new T3.PointsMaterial({ color: 0x9fb8d8, size: 0.055 })));
  // camera ring
  const frusG = new T3.BufferGeometry();
  {
    const L = []; const NC = 10;
    for (let c = 0; c < NC; c++) {
      const a = c / NC * Math.PI * 2, cx = 8.6 * Math.cos(a), cz = 8.6 * Math.sin(a), cy = 5.2;
      const dir = new T3.Vector3(-cx, -cy + 0.5, -cz).normalize();
      const up = new T3.Vector3(0, 1, 0), rt = dir.clone().cross(up).normalize().multiplyScalar(0.55);
      const u2 = rt.clone().cross(dir).normalize().multiplyScalar(0.38);
      const tip = new T3.Vector3(cx, cy, cz);
      const base = tip.clone().addScaledVector(dir, 1.25);
      const corners = [base.clone().add(rt).add(u2), base.clone().sub(rt).add(u2), base.clone().sub(rt).sub(u2), base.clone().add(rt).sub(u2)];
      for (let k = 0; k < 4; k++) {
        L.push(tip, corners[k], corners[k], corners[(k + 1) % 4]);
      }
    }
    frusG.setFromPoints(L);
  }
  scene.add(new T3.LineSegments(frusG, new T3.LineBasicMaterial({ color: 0xef5350, transparent: true, opacity: 0.5 })));

  // fitted surface at level n: control grid fit by binned average, drawn via bicubic-ish B-spline (use evalSurf)
  const RES = 34;
  const sg = new T3.PlaneGeometry(1, 1, RES, RES);
  const surf = new T3.Mesh(sg, new T3.MeshLambertMaterial({ color: 0x4fc3f7, transparent: true, opacity: 0.34, side: T3.DoubleSide, depthWrite: false }));
  const wire = new T3.LineSegments(new T3.WireframeGeometry(sg), new T3.LineBasicMaterial({ color: 0x69f0ae, transparent: true, opacity: 0.16 }));
  scene.add(surf, wire);

  function fitLevel(n) {         // n×n CPs
    const cpsL = new Float32Array(n * n * 3);
    for (let j = 0; j < n; j++) for (let i = 0; i < n; i++) {
      const x = (i / (n - 1) - 0.5) * 9, z = (j / (n - 1) - 0.5) * 9;
      let sum = 0, wsum = 0;
      const rad = 10 / n;
      for (const [px, py, pz] of pts) {
        const d2 = (px - x) * (px - x) + (pz - z) * (pz - z);
        if (d2 < rad * rad) { const w = 1 - Math.sqrt(d2) / rad; sum += py * w; wsum += w; }
      }
      const k = (j * n + i) * 3;
      cpsL[k] = x; cpsL[k + 1] = wsum > 0 ? sum / wsum : 0; cpsL[k + 2] = z;
    }
    return cpsL;
  }
  const LV = [4, 8, 16].map(n => ({ n, cps: fitLevel(n), K: clampedKnots(n, 3) }));
  // precompute surface vertex targets per phase (phase 0 = flat at 0 to look "uninitialized")
  const targets = [];
  {
    const _v = new T3.Vector3();
    for (let ph = 0; ph < 4; ph++) {
      const arr = new Float32Array((RES + 1) * (RES + 1) * 3);
      let idx = 0;
      for (let j = 0; j <= RES; j++) for (let i = 0; i <= RES; i++) {
        if (ph === 0) {
          arr[idx * 3] = (i / RES - 0.5) * 9; arr[idx * 3 + 1] = -2.2; arr[idx * 3 + 2] = (j / RES - 0.5) * 9;
        } else {
          const L = LV[ph - 1];
          evalSurf(L.cps, L.n, L.n, L.K, L.K, i / RES, j / RES, _v);
          arr[idx * 3] = _v.x; arr[idx * 3 + 1] = _v.y; arr[idx * 3 + 2] = _v.z;
        }
        idx++;
      }
      targets.push(arr);
    }
  }
  // rms per phase
  const rms = targets.map((arr, ph) => {
    if (ph === 0) return null;
    let s = 0, c = 0;
    for (let idx = 0; idx < arr.length; idx += 3) {
      const d = arr[idx + 1] - GT(arr[idx], arr[idx + 2]); s += d * d; c++;
    }
    return Math.sqrt(s / c);
  });

  let phase = 0, blend = 1, from = targets[0];
  const status = section.querySelector('#init-status');
  function setPhase(p) {
    from = currentArray(); phase = p; blend = 0;
    section.querySelectorAll('.init-ph').forEach(b => b.classList.toggle('on', +b.dataset.p === p));
    status.textContent = p === 0 ? 'raw SfM cloud — no surface yet' :
      LV[p - 1].n + '×' + LV[p - 1].n + ' control grid · RMS ' + rms[p].toFixed(3);
  }
  function currentArray() {
    const pos = sg.attributes.position, out = new Float32Array(pos.count * 3);
    for (let i = 0; i < pos.count; i++) { out[i * 3] = pos.getX(i); out[i * 3 + 1] = pos.getY(i); out[i * 3 + 2] = pos.getZ(i); }
    return out;
  }
  const handlers = [];
  section.querySelectorAll('.init-ph').forEach(b => {
    const h = () => setPhase(+b.dataset.p);
    b.addEventListener('click', h); handlers.push([b, h]);
  });
  setPhase(0);
  // auto-advance gently
  let autoT = 0;
  let raf = 0, dead = false;
  (function loop() {
    if (dead) return;
    raf = requestAnimationFrame(loop);
    autoT++;
    if (autoT % 260 === 0) setPhase((phase + 1) % 4);
    if (blend < 1) {
      blend = Math.min(1, blend + 0.03);
      const e = blend < 0.5 ? 2 * blend * blend : 1 - Math.pow(-2 * blend + 2, 2) / 2;
      const pos = sg.attributes.position, tgt = targets[phase];
      for (let i = 0; i < pos.count; i++) {
        pos.setXYZ(i,
          from[i * 3] + (tgt[i * 3] - from[i * 3]) * e,
          from[i * 3 + 1] + (tgt[i * 3 + 1] - from[i * 3 + 1]) * e,
          from[i * 3 + 2] + (tgt[i * 3 + 2] - from[i * 3 + 2]) * e);
      }
      pos.needsUpdate = true;
      sg.computeVertexNormals();
      wire.geometry.dispose();
      wire.geometry = new T3.WireframeGeometry(sg);
      surf.visible = wire.visible = !(phase === 0 && blend > 0.7);
    }
    sizeRenderer(rd, cv, cam);
    rd.render(scene, cam);
  })();
  return { dispose() {
    dead = true; cancelAnimationFrame(raf); stopOrbit();
    for (const [b, h] of handlers) b.removeEventListener('click', h);
    rd.dispose();
  } };
}

/* ═══════════════════ WIDGET: subdivision (2D) ═══════════════════ */
function wSubdiv(section) {
  const cv = section.querySelector('#subdiv-canvas');
  const ctx = cv.getContext('2d');
  const GT = x => 0.45 * Math.sin(x * 6.28318) + 0.28 * Math.sin(x * 15.2 + 1.1) + 0.13 * Math.sin(x * 33 + 2) * Math.exp(-Math.pow((x - 0.68) * 4, 2));
  let cps, K, n;
  function reset() {
    n = 5; K = clampedKnots(n, 3);
    cps = [];
    for (let i = 0; i < n; i++) { const x = i / (n - 1); cps.push([x, GT(x)]); }
  }
  function evalC(u) {
    const N = basisFuncs(K, 3, n, u);
    let x = 0, y = 0;
    for (let i = 0; i < n; i++) { x += N[i] * cps[i][0]; y += N[i] * cps[i][1]; }
    return [x, y];
  }
  function maxErrSpan() {
    let worstU = 0.5, worst = -1, worstSpan = null;
    for (let i = 3; i < K.length - 4; i++) {
      if (K[i + 1] <= K[i]) continue;
      let m = 0, mu = 0;
      for (let s = 0; s <= 10; s++) {
        const u = K[i] + (K[i + 1] - K[i]) * s / 10;
        const [px, py] = evalC(u);
        const e = Math.abs(py - GT(px));
        if (e > m) { m = e; mu = u; }
      }
      if (m > worst) { worst = m; worstU = (K[i] + K[i + 1]) / 2; worstSpan = [K[i], K[i + 1]]; }
    }
    return { u: worstU, err: worst, span: worstSpan };
  }
  function insert(ub) {
    const p = 3;
    let k = p; while (k < K.length - p - 2 && ub >= K[k + 1]) k++;
    const out = [];
    for (let i = 0; i < n + 1; i++) {
      let a;
      if (i <= k - p) a = 1; else if (i >= k + 1) a = 0;
      else a = (ub - K[i]) / (K[i + p] - K[i]);
      const A = cps[Math.min(i, n - 1)], B = cps[Math.max(i - 1, 0)];
      out.push([a * A[0] + (1 - a) * B[0], a * A[1] + (1 - a) * B[1]]);
    }
    K = K.slice(0, k + 1).concat([ub], K.slice(k + 1));
    cps = out; n++;
    // after exact insertion the curve is unchanged; nudge CPs toward GT (a few "gradient steps")
    for (let it = 0; it < 3; it++)
      for (let i = 0; i < n; i++) cps[i][1] += 0.55 * (GT(cps[i][0]) - evalC(Math.max(0.001, Math.min(0.999, cps[i][0])))[1]);
  }
  reset();
  const label = section.querySelector('#sd-label');
  let hi = null, hiT = 0;
  function draw() {
    if (!fitCanvas(cv)) return;
    const W = cv.width, H = cv.height, mx = W * 0.05, my = H * 0.14;
    const X = x => mx + x * (W - 2 * mx), Y = y => H / 2 - y * (H / 2 - my);
    ctx.clearRect(0, 0, W, H);
    // error fill
    ctx.beginPath();
    for (let s = 0; s <= 220; s++) { const u = s / 220; const [px, py] = evalC(u); s ? ctx.lineTo(X(px), Y(py)) : ctx.moveTo(X(px), Y(py)); }
    for (let s = 220; s >= 0; s--) { const x = s / 220; s === 220 ? ctx.lineTo(X(x), Y(GT(x))) : ctx.lineTo(X(x), Y(GT(x))); }
    ctx.closePath(); ctx.fillStyle = 'rgba(239,83,80,0.10)'; ctx.fill();
    // GT
    ctx.beginPath();
    for (let s = 0; s <= 260; s++) { const x = s / 260; s ? ctx.lineTo(X(x), Y(GT(x))) : ctx.moveTo(X(x), Y(GT(x))); }
    ctx.strokeStyle = '#69f0ae'; ctx.lineWidth = Math.max(1.5, W / 700); ctx.stroke();
    // curve
    ctx.beginPath();
    for (let s = 0; s <= 260; s++) { const u = s / 260; const [px, py] = evalC(u); s ? ctx.lineTo(X(px), Y(py)) : ctx.moveTo(X(px), Y(py)); }
    ctx.strokeStyle = '#ef5350'; ctx.lineWidth = Math.max(2, W / 550); ctx.stroke();
    // highlight span
    if (hi && hiT > 0) {
      ctx.fillStyle = 'rgba(255,167,38,' + (0.14 * Math.min(1, hiT)).toFixed(3) + ')';
      ctx.fillRect(X(hi[0]), my * 0.6, X(hi[1]) - X(hi[0]), H - my * 1.2);
      hiT -= 0.015;
    }
    // CPs
    for (const [x, y] of cps) {
      ctx.beginPath(); ctx.arc(X(x), Y(y), Math.max(3.5, W / 260), 0, 6.29);
      ctx.fillStyle = '#ffa726'; ctx.fill();
    }
    // knot ticks
    ctx.fillStyle = '#5c6f8a';
    for (let i = 3; i < K.length - 3; i++) ctx.fillRect(X(K[i]) - 1, H - my * 0.75, 2, my * 0.35);
    const me = maxErrSpan();
    label.textContent = n + ' control points · max error ' + me.err.toFixed(3);
  }
  const stepBtn = section.querySelector('#sd-step'), resetBtn = section.querySelector('#sd-reset');
  const onStep = () => {
    if (n > 40) return;
    const me = maxErrSpan();
    hi = me.span; hiT = 1.4;
    insert(me.u);
  };
  const onReset = () => { reset(); hi = null; };
  stepBtn.addEventListener('click', onStep);
  resetBtn.addEventListener('click', onReset);
  let raf = 0, dead = false;
  (function loop() { if (dead) return; raf = requestAnimationFrame(loop); draw(); })();
  return { dispose() {
    dead = true; cancelAnimationFrame(raf);
    stepBtn.removeEventListener('click', onStep);
    resetBtn.removeEventListener('click', onReset);
  } };
}

        plugins: { legend: { labels: { color: tickC, font: { size: 11, family: 'Inter' } } } },
        scales: {
          x: { title: { display: true, text: 'iteration', color: tickC }, ticks: { color: tickC }, grid: { color: gridC } },
          y: { title: { display: true, text: 'PSNR (dB)', color: tickC }, ticks: { color: tickC }, grid: { color: gridC }, min: 8, max: 34 }
        }
      }
    });
  }
  return { dispose() {} };   // charts persist — cheap, and reveal may revisit
}

/* ═══════════════════ widget manager + reveal ═══════════════════ */
const FACTORIES = { title: wTitle, bspline: wBspline, frame: wFrame, init: wInit, subdiv: wSubdiv, sim: wSim, charts: wCharts };
let activeWidget = null, activeSection = null;
function mountFor(section) {
  if (activeSection === section) return;
  if (activeWidget) { try { activeWidget.dispose(); } catch (e) { console.warn(e); } activeWidget = null; activeSection = null; }
  const name = section && section.dataset.widget;
  if (name && FACTORIES[name]) {
    try { activeWidget = FACTORIES[name](section); activeSection = section; }
    catch (e) { console.error('widget ' + name, e); }
  }
}

Reveal.initialize({
  width: 1400, height: 790, margin: 0.02,
  hash: true, center: false, transition: 'slide', transitionSpeed: 'fast',
  slideNumber: 'c/t', controlsTutorial: false,
  keyboardCondition: e => !(e.target && (e.target.tagName === 'INPUT' || e.target.closest('.kss-root')))
}).then(() => {
  const render = () => {
    if (window.renderMathInElement) {
      renderMathInElement(document.querySelector('.slides'), {
        delimiters: [{ left: '$$', right: '$$', display: true }, { left: '$', right: '$', display: false }],
        throwOnError: false
      });
    } else setTimeout(render, 120);
  };
  render();
  mountFor(Reveal.getCurrentSlide());
});
function katexRender(root) {
  if (window.renderMathInElement && root) {
    renderMathInElement(root, {
      delimiters: [{ left: '$$', right: '$$', display: true }, { left: '$', right: '$', display: false }],
      throwOnError: false
    });
  }
}
Reveal.on('slidechanged', ev => { mountFor(ev.currentSlide); katexRender(ev.currentSlide); });
// click anywhere non-interactive → advance (presenter-style)
document.querySelector('.reveal').addEventListener('click', e => {
  if (e.target.closest('button, input, a, select, label, .kss-root, .widget-ui, #bs-cp-panel, table')) return;
  if (e.target.tagName === 'CANVAS' && e.target.id !== 'title-bg') return;
  if (window.getSelection && String(window.getSelection())) return;
  Reveal.next();
});
</script>
